<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OOP体験ゲーム — アクセス制御</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --surface-0: #f1efe8;
  --surface-1: #f8f7f4;
  --surface-2: #ffffff;
  --text-primary: #1a1a18;
  --text-secondary: #5f5e5a;
  --text-muted: #888780;
  --border: rgba(0,0,0,0.13);
  --border-strong: rgba(0,0,0,0.22);
  --bg-success: #eaf3de;
  --text-success: #3b6d11;
  --border-success: #97c459;
  --bg-danger: #fcebeb;
  --text-danger: #a32d2d;
  --border-danger: #f09595;
  --bg-warning: #faeeda;
  --text-warning: #854f0b;
  --border-warning: #ef9f27;
  --bg-accent: #e6f1fb;
  --text-accent: #185fa5;
  --border-accent: #85b7eb;
  --fill-accent: #378add;
  --bg-pro: #eeedfe;
  --text-pro: #534ab7;
  --radius: 8px;
  --font: system-ui, -apple-system, sans-serif;
  --mono: ui-monospace, 'Cascadia Code', monospace;
}
@media (prefers-color-scheme: dark) {
  :root {
    --surface-0: #1c1c1a; --surface-1: #252523; --surface-2: #2e2e2b;
    --text-primary: #f0ede6; --text-secondary: #a8a69f; --text-muted: #6e6c67;
    --border: rgba(255,255,255,0.11); --border-strong: rgba(255,255,255,0.2);
    --bg-success: #173404; --text-success: #c0dd97; --border-success: #3b6d11;
    --bg-danger: #501313; --text-danger: #f09595; --border-danger: #a32d2d;
    --bg-warning: #412402; --text-warning: #fac775; --border-warning: #ba7517;
    --bg-accent: #042c53; --text-accent: #85b7eb; --border-accent: #185fa5;
    --bg-pro: #26215c; --text-pro: #afa9ec;
  }
}
body { font-family: var(--font); background: var(--surface-0); color: var(--text-primary); min-height: 100vh; display: flex; justify-content: center; padding: 2rem 1rem; }
.wrap { width: 100%; max-width: 700px; }

/* header */
.hdr { margin-bottom: 1.5rem; }
.hdr h1 { font-size: 22px; font-weight: 500; margin-bottom: 4px; }
.hdr p { font-size: 14px; color: var(--text-secondary); line-height: 1.6; }

/* concept card */
.concept { background: var(--bg-accent); border: 1px solid var(--border-accent); border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 1.5rem; font-size: 14px; line-height: 1.7; color: var(--text-accent); }
.concept strong { font-weight: 500; }

/* visitor selector */
.visitor-section { margin-bottom: 1.25rem; }
.vs-label { font-size: 13px; color: var(--text-secondary); margin-bottom: 0.5rem; }
.visitors { display: flex; gap: 8px; flex-wrap: wrap; }
.visitor-btn {
  display: flex; align-items: center; gap: 8px;
  padding: 0.6rem 1rem; border-radius: var(--radius);
  border: 2px solid var(--border-strong); background: var(--surface-2);
  cursor: pointer; font-size: 14px; font-family: var(--font);
  color: var(--text-primary); transition: all 0.15s;
}
.visitor-btn:hover { background: var(--surface-1); }
.visitor-btn.active { border-color: var(--fill-accent); background: var(--bg-accent); color: var(--text-accent); }
.visitor-icon { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 15px; }
.vi-ext { background: #faeeda; }
.vi-child { background: #eeedfe; }
.vi-self { background: #eaf3de; }

/* arena */
.arena { display: grid; grid-template-columns: 1fr 60px 1fr; gap: 0; align-items: start; margin-bottom: 1.25rem; }
.class-box { border: 2px solid var(--text-secondary); border-radius: 0; background: var(--surface-2); }
.cls-head { background: var(--surface-0); border-bottom: 1.5px solid var(--text-secondary); padding: 8px 14px; font-weight: 500; text-align: center; font-size: 15px; }
.cls-section { border-bottom: 1.5px solid var(--text-secondary); padding: 4px 0; }
.cls-section:last-child { border-bottom: none; }
.member {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 14px; font-family: var(--mono); font-size: 13px;
  cursor: pointer; border-left: 3px solid transparent;
  transition: all 0.15s; user-select: none;
}
.member:hover { background: var(--surface-1); }
.member.selected { background: var(--surface-1); border-left-color: var(--fill-accent); }
.member.correct { background: var(--bg-success); border-left-color: var(--text-success); }
.member.wrong { background: var(--bg-danger); border-left-color: var(--text-danger); }
.member.locked { cursor: default; }
.mod { font-size: 12px; font-weight: 500; padding: 2px 5px; border-radius: 3px; min-width: 20px; text-align: center; }
.mod-pub { background: var(--bg-success); color: var(--text-success); }
.mod-pri { background: var(--bg-danger); color: var(--text-danger); }
.mod-pro { background: var(--bg-pro); color: var(--text-pro); }
.member-name { flex: 1; }
.member-check { font-size: 16px; opacity: 0; transition: opacity 0.2s; }
.member.correct .member-check::after { content: "✓"; color: var(--text-success); opacity: 1; }
.member.wrong .member-check::after { content: "✗"; color: var(--text-danger); opacity: 1; }

/* arrow area */
.arrow-col { display: flex; flex-direction: column; align-items: center; justify-content: center; padding-top: 60px; gap: 4px; }
.arrow-svg { opacity: 0.5; }

/* child class box */
.child-box { border: 2px dashed var(--text-muted); border-radius: 0; background: var(--surface-1); }
.child-box .cls-head { background: var(--surface-1); font-style: italic; font-size: 14px; color: var(--text-secondary); }
.child-code { padding: 10px 14px; font-family: var(--mono); font-size: 12px; color: var(--text-muted); }

/* result panel */
.result-panel { border-radius: 12px; padding: 1rem 1.25rem; font-size: 14px; line-height: 1.6; margin-bottom: 1rem; display: none; }
.result-panel.show { display: block; }
.result-panel.ok { background: var(--bg-success); color: var(--text-success); border: 1px solid var(--border-success); }
.result-panel.ng { background: var(--bg-danger); color: var(--text-danger); border: 1px solid var(--border-danger); }

/* action buttons */
.actions { display: flex; gap: 8px; flex-wrap: wrap; }
.btn { border: 1px solid var(--border-strong); background: transparent; border-radius: var(--radius); padding: 0.6rem 1.25rem; font-size: 14px; cursor: pointer; color: var(--text-primary); font-family: var(--font); }
.btn:hover { background: var(--surface-1); }
.btn-primary { background: var(--fill-accent); color: #fff; border-color: var(--fill-accent); }
.btn-primary:hover { opacity: 0.9; background: var(--fill-accent); }

/* progress */
.progress-bar { height: 4px; background: var(--border); border-radius: 2px; margin-bottom: 1.5rem; }
.progress-fill { height: 100%; background: var(--fill-accent); border-radius: 2px; transition: width 0.4s; }

/* legend */
.legend { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 1rem; }
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-secondary); }

/* score */
.score-row { display: flex; gap: 10px; margin-bottom: 1.25rem; flex-wrap: wrap; }
.score-chip { background: var(--surface-1); border: 1px solid var(--border); border-radius: var(--radius); padding: 4px 12px; font-size: 13px; color: var(--text-secondary); }
.score-chip b { color: var(--text-primary); }

/* complete */
.complete { text-align: center; padding: 2rem 0; }
.complete h2 { font-size: 24px; font-weight: 500; margin-bottom: 0.5rem; }
.big-score { font-size: 48px; font-weight: 500; color: var(--fill-accent); margin: 0.5rem 0; }
.complete p { color: var(--text-secondary); font-size: 14px; margin-bottom: 1.5rem; }

/* instruction hint */
.hint { font-size: 13px; color: var(--text-muted); margin-bottom: 0.75rem; }
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <h1>アクセス制御を体験する</h1>
    <p>誰がどのメンバーにアクセスできるか、実際に試して確かめよう。</p>
  </div>

  <div class="concept">
    <strong>アクセス修飾子とは？</strong><br>
    クラスのメンバー（フィールド・メソッド）に「誰がアクセスできるか」を制限する仕組みです。
    <br><br>
    <strong style="color:var(--text-success)">+ public</strong> → 誰でもアクセス可
    <strong style="color:var(--text-danger)">− private</strong> → クラス自身のみ
    <strong style="color:var(--text-pro)"># protected</strong> → 自クラス＋子クラスのみ
  </div>

  <div class="progress-bar"><div class="progress-fill" id="prog" style="width:0%"></div></div>
  <div class="score-row">
    <div class="score-chip">問題 <b id="q-num">1</b> / <b id="q-total">5</b></div>
    <div class="score-chip">スコア <b id="score">0</b></div>
  </div>

  <div id="game"></div>
</div>

<script>
const rounds = [
  {
    title: "BankAccount クラス",
    cls: "BankAccount",
    child: "SavingsAccount",
    childCode: "// BankAccountを継承",
    members: [
      { mod: "pri", name: "balance: double",      pub: false, pro: false },
      { mod: "pri", name: "pin: int",             pub: false, pro: false },
      { mod: "pro", name: "accountId: String",    pub: false, pro: true  },
      { mod: "pub", name: "owner: String",        pub: true,  pro: true  },
      { mod: "pub", name: "getBalance(): double", pub: true,  pro: true  },
      { mod: "pri", name: "validatePin(): bool",  pub: false, pro: false },
    ],
    visitors: [
      { key: "ext",   label: "外部コード",    icon: "🌐", cls: "vi-ext",   canAccess: m => m.pub },
      { key: "child", label: "子クラス",      icon: "🧬", cls: "vi-child", canAccess: m => m.pro },
      { key: "self",  label: "同じクラス内",  icon: "🔑", cls: "vi-self",  canAccess: () => true },
    ],
    explain: {
      ext:   "外部コードからは public (+) のみアクセスできます。balance や pin は外から覗けません。",
      child: "子クラスからは public (+) と protected (#) にアクセスできます。private (−) は継承先でも触れません。",
      self:  "クラス自身のコード内からはすべてのメンバーにアクセスできます。これが private の意味です。"
    }
  },
  {
    title: "Person クラス",
    cls: "Person",
    child: "Student",
    childCode: "// Personを継承",
    members: [
      { mod: "pri", name: "birthYear: int",    pub: false, pro: false },
      { mod: "pro", name: "name: String",      pub: false, pro: true  },
      { mod: "pub", name: "email: String",     pub: true,  pro: true  },
      { mod: "pri", name: "password: String",  pub: false, pro: false },
      { mod: "pub", name: "greet(): void",     pub: true,  pro: true  },
      { mod: "pro", name: "getAge(): int",     pub: false, pro: true  },
    ],
    visitors: [
      { key: "ext",   label: "外部コード",    icon: "🌐", cls: "vi-ext",   canAccess: m => m.pub },
      { key: "child", label: "子クラス",      icon: "🧬", cls: "vi-child", canAccess: m => m.pro },
      { key: "self",  label: "同じクラス内",  icon: "🔑", cls: "vi-self",  canAccess: () => true },
    ],
    explain: {
      ext:   "外部から email と greet() だけ見えます。birthYear や password を隠すことでデータを保護できます。",
      child: "子クラス Student は name・email・greet()・getAge() にアクセスできます。password は継承先でも隠されます。",
      self:  "Person クラス内のコードはすべてのメンバーにアクセスできます。private はクラス外だけに閉じています。"
    }
  },
  {
    title: "GameCharacter クラス",
    cls: "GameCharacter",
    child: "Warrior",
    childCode: "// GameCharacterを継承",
    members: [
      { mod: "pub", name: "name: String",       pub: true,  pro: true  },
      { mod: "pri", name: "hp: int",            pub: false, pro: false },
      { mod: "pro", name: "attackPower: int",   pub: false, pro: true  },
      { mod: "pub", name: "getHp(): int",       pub: true,  pro: true  },
      { mod: "pri", name: "secretSkill(): void",pub: false, pro: false },
      { mod: "pro", name: "levelUp(): void",    pub: false, pro: true  },
    ],
    visitors: [
      { key: "ext",   label: "外部コード",    icon: "🌐", cls: "vi-ext",   canAccess: m => m.pub },
      { key: "child", label: "子クラス",      icon: "🧬", cls: "vi-child", canAccess: m => m.pro },
      { key: "self",  label: "同じクラス内",  icon: "🔑", cls: "vi-self",  canAccess: () => true },
    ],
    explain: {
      ext:   "ゲームの外部コードは name と getHp() で名前とHPを読めますが、hp の直接変更はできません。ゲームの不正防止に役立ちます。",
      child: "Warrior クラスは attackPower と levelUp() を使って独自のキャラクター能力を実装できます。secretSkill は基底クラス専用です。",
      self:  "GameCharacter クラス自身はすべてにアクセスできます。hp を直接変えるのはクラス内のメソッドだけに任せることで整合性を保てます。"
    }
  },
  {
    title: "DatabaseConnection クラス",
    cls: "DatabaseConnection",
    child: "MySQLConnection",
    childCode: "// DatabaseConnectionを継承",
    members: [
      { mod: "pri", name: "password: String",   pub: false, pro: false },
      { mod: "pri", name: "host: String",       pub: false, pro: false },
      { mod: "pro", name: "port: int",          pub: false, pro: true  },
      { mod: "pub", name: "connect(): bool",    pub: true,  pro: true  },
      { mod: "pub", name: "disconnect(): void", pub: true,  pro: true  },
      { mod: "pro", name: "query(): Result",    pub: false, pro: true  },
    ],
    visitors: [
      { key: "ext",   label: "外部コード",    icon: "🌐", cls: "vi-ext",   canAccess: m => m.pub },
      { key: "child", label: "子クラス",      icon: "🧬", cls: "vi-child", canAccess: m => m.pro },
      { key: "self",  label: "同じクラス内",  icon: "🔑", cls: "vi-self",  canAccess: () => true },
    ],
    explain: {
      ext:   "外部からは connect() と disconnect() だけ使えます。パスワードやホスト名は絶対に外に漏れません。",
      child: "MySQLConnection は port と query() を使ってMySQL独自の接続処理を実装できます。password は子クラスでも見えません。",
      self:  "クラス内では password も host も自由に使えます。private にすることでパスワードの扱いをクラスが完全に管理します。"
    }
  },
  {
    title: "Animal クラス",
    cls: "Animal",
    child: "Dog",
    childCode: "// Animalを継承",
    members: [
      { mod: "pub", name: "species: String",    pub: true,  pro: true  },
      { mod: "pro", name: "sound: String",      pub: false, pro: true  },
      { mod: "pri", name: "dna: String",        pub: false, pro: false },
      { mod: "pub", name: "eat(): void",        pub: true,  pro: true  },
      { mod: "pro", name: "makeSound(): void",  pub: false, pro: true  },
      { mod: "pri", name: "mutate(): void",     pub: false, pro: false },
    ],
    visitors: [
      { key: "ext",   label: "外部コード",    icon: "🌐", cls: "vi-ext",   canAccess: m => m.pub },
      { key: "child", label: "子クラス",      icon: "🧬", cls: "vi-child", canAccess: m => m.pro },
      { key: "self",  label: "同じクラス内",  icon: "🔑", cls: "vi-self",  canAccess: () => true },
    ],
    explain: {
      ext:   "外部コードは species と eat() だけ使えます。動物のDNAや突然変異メソッドは外部に公開する必要がありません。",
      child: "Dog クラスは sound を上書きして「ワン」にしたり、makeSound() を呼んで鳴き声を出せます。dna と mutate() は Dog でも触れません。",
      self:  "Animal クラス内ではすべてのメンバーにアクセスできます。dna を private にすることで生物学的な整合性を保てます。"
    }
  }
];

let rIdx = 0, score = 0;
let selectedVisitor = null;
let answered = false;
let selections = {};

function renderRound() {
  answered = false;
  selectedVisitor = null;
  selections = {};
  document.getElementById('prog').style.width = ((rIdx / rounds.length) * 100) + '%';
  document.getElementById('q-num').textContent = rIdx + 1;
  document.getElementById('q-total').textContent = rounds.length;

  const r = rounds[rIdx];
  document.getElementById('game').innerHTML = buildRoundHTML(r);
}

function buildRoundHTML(r) {
  const memberRows = r.members.map((m, i) => `
    <div class="member" id="m${i}" onclick="toggleMember(${i})">
      <span class="mod mod-${m.mod}">${m.mod === 'pub' ? '+' : m.mod === 'pri' ? '−' : '#'}</span>
      <span class="member-name">${m.name}</span>
      <span class="member-check" id="mc${i}"></span>
    </div>
  `).join('');

  const fields = r.members.filter(m => !m.name.includes('('));
  const methods = r.members.filter(m => m.name.includes('('));

  const fieldRows = fields.map((m, i) => {
    const gi = r.members.indexOf(m);
    return `<div class="member" id="m${gi}" onclick="toggleMember(${gi})">
      <span class="mod mod-${m.mod}">${m.mod === 'pub' ? '+' : m.mod === 'pri' ? '−' : '#'}</span>
      <span class="member-name">${m.name}</span>
      <span class="member-check" id="mc${gi}"></span>
    </div>`;
  }).join('');

  const methodRows = methods.map((m) => {
    const gi = r.members.indexOf(m);
    return `<div class="member" id="m${gi}" onclick="toggleMember(${gi})">
      <span class="mod mod-${m.mod}">${m.mod === 'pub' ? '+' : m.mod === 'pri' ? '−' : '#'}</span>
      <span class="member-name">${m.name}</span>
      <span class="member-check" id="mc${gi}"></span>
    </div>`;
  }).join('');

  const visitorBtns = r.visitors.map(v => `
    <button class="visitor-btn" id="vb-${v.key}" onclick="selectVisitor('${v.key}')">
      <div class="visitor-icon ${v.cls}">${v.icon}</div>
      ${v.label}
    </button>
  `).join('');

  return `
    <div class="visitor-section">
      <div class="vs-label">① 訪問者を選んでください</div>
      <div class="visitors">${visitorBtns}</div>
    </div>

    <div class="hint" id="hint">← 訪問者を選ぶとメンバーを選択できます</div>

    <div class="arena">
      <div class="class-box">
        <div class="cls-head">${r.cls}</div>
        <div class="cls-section">${fieldRows}</div>
        <div class="cls-section">${methodRows}</div>
      </div>
      <div class="arrow-col">
        <svg class="arrow-svg" width="40" height="50" viewBox="0 0 40 50">
          <line x1="20" y1="2" x2="20" y2="38" stroke="currentColor" stroke-width="1.5" stroke-dasharray="4,3"/>
          <polygon points="12,32 20,48 28,32" fill="none" stroke="currentColor" stroke-width="1.5"/>
        </svg>
        <span style="font-size:10px;color:var(--text-muted);text-align:center">継承</span>
      </div>
      <div class="class-box child-box">
        <div class="cls-head">${r.child}</div>
        <div class="cls-section">
          <div class="child-code">${r.childCode}</div>
        </div>
      </div>
    </div>

    <div class="result-panel" id="result"></div>

    <div class="actions">
      <button class="btn btn-primary" onclick="checkAnswer()" id="check-btn" disabled>② アクセスできるメンバーをすべて選んで確認</button>
    </div>
  `;
}

function selectVisitor(key) {
  if (answered) return;
  selectedVisitor = key;
  selections = {};
  document.querySelectorAll('.visitor-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('vb-' + key).classList.add('active');
  document.querySelectorAll('.member').forEach(m => { m.classList.remove('selected', 'correct', 'wrong'); });
  document.querySelectorAll('.member-check').forEach(c => { c.innerHTML = ''; });
  document.getElementById('hint').textContent = 'アクセスできると思うメンバーをすべてクリックしてください（複数選択可）';
  document.getElementById('check-btn').disabled = false;
  document.getElementById('check-btn').textContent = '② アクセスできるメンバーをすべて選んで確認';
  const result = document.getElementById('result');
  result.className = 'result-panel';
}

function toggleMember(i) {
  if (!selectedVisitor || answered) return;
  const el = document.getElementById('m' + i);
  if (selections[i]) {
    delete selections[i];
    el.classList.remove('selected');
  } else {
    selections[i] = true;
    el.classList.add('selected');
  }
}

function checkAnswer() {
  if (!selectedVisitor) return;
  const r = rounds[rIdx];
  const visitor = r.visitors.find(v => v.key === selectedVisitor);
  answered = true;

  let correct = true;
  r.members.forEach((m, i) => {
    const shouldAccess = visitor.canAccess(m);
    const didSelect = !!selections[i];
    const el = document.getElementById('m' + i);
    const mc = document.getElementById('mc' + i);
    el.classList.remove('selected');
    if (shouldAccess === didSelect) {
      el.classList.add('correct');
      mc.innerHTML = shouldAccess ? '<span style="color:var(--text-success)">✓</span>' : '<span style="color:var(--text-muted)">−</span>';
    } else {
      el.classList.add('wrong');
      mc.innerHTML = '<span style="color:var(--text-danger)">✗</span>';
      correct = false;
    }
  });

  const gained = correct ? 20 : 5;
  score += gained;
  document.getElementById('score').textContent = score;

  const result = document.getElementById('result');
  result.className = 'result-panel show ' + (correct ? 'ok' : 'ng');

  const correctMembers = r.members.filter(m => visitor.canAccess(m)).map(m => m.name);
  const explain = r.explain[selectedVisitor];
  result.innerHTML = (correct ? '✓ 正解！ ' : '✗ 不正解。') + explain
    + `<br><br><strong>アクセスできるメンバー:</strong> ${correctMembers.join('、')}`;

  const btn = document.getElementById('check-btn');
  btn.textContent = rIdx < rounds.length - 1 ? '次のクラスへ →' : '結果を見る →';
  btn.onclick = nextRound;
  btn.disabled = false;
}

function nextRound() {
  rIdx++;
  if (rIdx >= rounds.length) {
    showComplete();
    return;
  }
  renderRound();
}

function showComplete() {
  document.getElementById('prog').style.width = '100%';
  const pct = Math.round(score / (rounds.length * 20) * 100);
  const msg = pct >= 80
    ? 'アクセス制御の概念をしっかり理解できています！'
    : pct >= 50
    ? 'もう少し！ public/private/protected の違いを確認してみましょう。'
    : '緑の解説をもう一度読み返してみましょう。概念がつかめてきます。';
  document.getElementById('game').innerHTML = `
    <div class="complete">
      <h2>完了！</h2>
      <div class="big-score">${score}<span style="font-size:20px;color:var(--text-muted)"> / ${rounds.length * 20}</span></div>
      <p>${msg}</p>
      <div style="background:var(--bg-accent);border:1px solid var(--border-accent);border-radius:12px;padding:1rem 1.25rem;text-align:left;font-size:14px;color:var(--text-accent);margin-bottom:1.5rem;line-height:1.8">
        <strong>まとめ</strong><br>
        <strong>+ public</strong> — 誰でもアクセス可。外部に公開するAPIはこれ<br>
        <strong>− private</strong> — クラス自身のみ。データの保護・隠蔽に使う<br>
        <strong># protected</strong> — 自分と子クラスのみ。継承を意識した設計に使う<br><br>
        このルールがあることで「クラスの外から直接 hp を書き換えられない」ような安全な設計ができます。
      </div>
      <button class="btn btn-primary" onclick="restartGame()">もう一度やる</button>
    </div>
  `;
}

function restartGame() {
  rIdx = 0; score = 0;
  document.getElementById('score').textContent = 0;
  renderRound();
}

renderRound();
</script>
</body>
</html>
