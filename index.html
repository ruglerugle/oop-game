<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OOPクエスト 序章：動物園チュートリアル</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%;text-size-adjust:100%;}
html,body{max-width:100vw;overflow-x:hidden}
:root{
  --s0:#f1efe8;--s1:#f8f7f4;--s2:#fff;
  --tp:#1a1a18;--ts:#5f5e5a;--tm:#888780;
  --bd:rgba(0,0,0,.13);--bds:rgba(0,0,0,.22);
  --ok:#eaf3de;--tok:#3b6d11;--bok:#97c459;
  --ng:#fcebeb;--tng:#a32d2d;--bng:#f09595;
  --ac:#e6f1fb;--tac:#185fa5;--bac:#85b7eb;--fac:#378add;
  --pr:#eeedfe;--tpr:#534ab7;
  --wn:#faeeda;--twn:#854f0b;--bwn:#ef9f27;
  --r:8px;--f:system-ui,-apple-system,sans-serif;--m:ui-monospace,'Cascadia Code',monospace;
}
@media(prefers-color-scheme:dark){:root{
  --s0:#1c1c1a;--s1:#252523;--s2:#2e2e2b;
  --tp:#f0ede6;--ts:#a8a69f;--tm:#6e6c67;
  --bd:rgba(255,255,255,.11);--bds:rgba(255,255,255,.2);
  --ok:#173404;--tok:#c0dd97;--bok:#3b6d11;
  --ng:#501313;--tng:#f09595;--bng:#a32d2d;
  --ac:#042c53;--tac:#85b7eb;--bac:#185fa5;
  --pr:#26215c;--tpr:#afa9ec;
  --wn:#412402;--twn:#fac775;--bwn:#ba7517;
}}
body{font-family:var(--f);background:var(--s0);color:var(--tp);min-height:100vh;display:flex;justify-content:center;padding:1.5rem 1rem}
.wrap{width:100%;max-width:700px}

/* ── ナビ ── */
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;gap:8px;flex-wrap:wrap}
.chapter-nav{display:flex;gap:6px;flex-wrap:wrap}
.ch-dot{padding:4px 12px;border-radius:99px;font-size:12px;border:1px solid var(--bd);background:var(--s1);color:var(--tm);transition:all .2s}
.ch-dot.done{background:var(--ok);color:var(--tok);border-color:var(--bok)}
.ch-dot.active{background:var(--fac);color:#fff;border-color:var(--fac)}
.top-btns{display:flex;gap:6px}
.progress{height:4px;background:var(--bd);border-radius:2px;margin-bottom:1.25rem}
.progress-fill{height:100%;background:var(--fac);border-radius:2px;transition:width .4s}

/* ── 用語ツールチップ ── */
.gloss-term{color:var(--fac);text-decoration:underline;text-decoration-style:dotted;cursor:help;text-underline-offset:3px}
.gloss-term:hover{background:var(--ac);border-radius:2px}
#gloss-popup{display:none;position:fixed;z-index:200;background:var(--s2);border:1px solid var(--bds);border-radius:12px;padding:1rem 1.25rem 1rem 1rem;box-shadow:0 6px 24px rgba(0,0,0,.18);max-width:280px;width:calc(100vw - 32px)}
#gloss-popup strong{display:block;margin-bottom:.5rem;font-size:14px;color:var(--tp)}
#gloss-popup p{color:var(--ts);line-height:1.65;font-size:13px}
#gloss-close{position:absolute;top:8px;right:8px;background:none;border:none;cursor:pointer;color:var(--tm);font-size:18px;line-height:1;padding:2px 6px;font-family:var(--f)}

/* ── ストーリー ── */
.story-panel{background:var(--s2);border:1px solid var(--bd);border-radius:16px;padding:1.25rem;margin-bottom:1rem}
.npc{display:flex;align-items:flex-start;gap:10px;margin-bottom:1rem}
.npc-avatar{font-size:32px;flex-shrink:0;line-height:1}
.npc-name{font-size:11px;font-weight:500;color:var(--tm);margin-bottom:4px}
.bubble{background:var(--s1);border:1px solid var(--bd);border-radius:0 12px 12px 12px;padding:.75rem 1rem;font-size:14px;line-height:1.8;color:var(--tp)}
.story-actions{display:flex;justify-content:flex-end}

/* ── 汎用ボタン ── */
.btn{border:1px solid var(--bds);background:transparent;border-radius:var(--r);padding:.6rem 1.25rem;font-size:14px;cursor:pointer;color:var(--tp);font-family:var(--f);transition:background .15s;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.btn:hover{background:var(--s1)}
.btn-p{background:var(--fac);color:#fff;border-color:var(--fac)}
.btn-p:hover{opacity:.9;background:var(--fac)}
.btn:disabled{opacity:.4;cursor:default;pointer-events:none}
.btn-sm{padding:.4rem .75rem;font-size:12px}

.ch-title{font-size:11px;font-weight:500;color:var(--tm);letter-spacing:.08em;margin-bottom:4px}
.ch-heading{font-size:20px;font-weight:500;margin-bottom:1rem;color:var(--tp)}
.game-intro{font-size:14px;color:var(--ts);margin-bottom:1rem;line-height:1.6}

/* ── UML クラスボックス ── */
.uml-class{border:2px solid var(--ts);background:var(--s2)}
.uml-head{background:var(--s0);border-bottom:1.5px solid var(--ts);padding:8px 14px;font-weight:500;text-align:center;font-size:14px}
.uml-sec{border-bottom:1.5px solid var(--ts);padding:4px 0}
.uml-sec:last-child{border-bottom:none}
.m-row{display:flex;align-items:center;gap:8px;padding:8px 12px;font-family:var(--m);font-size:12px;border-left:3px solid transparent}
.m-name{flex:1;word-break:break-all}
.m-mod-btn{display:flex;gap:4px;flex-shrink:0}
.mod-opt{padding:4px 8px;border-radius:4px;font-size:11px;font-weight:500;cursor:pointer;border:1.5px solid transparent;opacity:.4;transition:all .15s;touch-action:manipulation}
.mod-opt:hover{opacity:.7}
.mod-opt.sel{opacity:1;border-color:currentColor}
.mod-pub{color:var(--tok);background:var(--ok)}
.mod-pri{color:var(--tng);background:var(--ng)}
.mod-pro{color:var(--tpr);background:var(--pr)}

/* ── 継承ツリー ── */
.tree-wrap{background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:1.25rem 1rem;margin-bottom:1rem;overflow-x:auto;-webkit-overflow-scrolling:touch}
.cards-area{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1rem}
.class-card{padding:6px 12px;border:2px solid var(--bds);border-radius:var(--r);background:var(--s2);cursor:pointer;font-size:12px;font-weight:500;transition:all .15s;user-select:none;touch-action:manipulation}
.class-card:hover,.class-card.selected{border-color:var(--fac);background:var(--ac);color:var(--tac)}
.class-card.placed{opacity:.3;cursor:default;pointer-events:none}

/* ── 合成/集約 ── */
.worlds{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1rem}
.world-box{background:var(--s2);border:1px solid var(--bd);border-radius:12px;padding:1rem;text-align:center}
.world-title{font-size:12px;font-weight:500;margin-bottom:.75rem;color:var(--ts)}
.obj-block{padding:8px 12px;border:2px solid var(--ts);background:var(--s2);font-size:12px;font-weight:500;border-radius:4px;transition:opacity .5s,transform .5s;display:inline-block}
.obj-block.dead{opacity:0;transform:scale(.6)}
.compose-line{width:2px;height:16px;margin:0 auto}
.compose-line.solid{background:var(--tp)}
.compose-line.dashed{background:repeating-linear-gradient(to bottom,var(--ts) 0,var(--ts) 4px,transparent 4px,transparent 8px)}
.diamond{width:11px;height:11px;transform:rotate(45deg);margin:3px auto}
.diamond.filled{background:var(--tp)}
.diamond.empty-d{border:2px solid var(--tp)}
.rel-label{font-size:11px;color:var(--tm);margin:.5rem 0;line-height:1.4}
.world-quiz{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:.875rem 1rem;margin-bottom:.75rem}
.wq-q{font-size:13px;margin-bottom:.75rem;line-height:1.6}
.wq-opts{display:flex;gap:8px;flex-wrap:wrap}
.wq-opt{padding:8px 16px;border:1px solid var(--bds);border-radius:var(--r);font-size:13px;cursor:pointer;background:var(--s2);transition:all .15s;touch-action:manipulation}
.wq-opt:hover{background:var(--s1)}
.wq-opt.ok{background:var(--ok);border-color:var(--bok);color:var(--tok)}
.wq-opt.ng{background:var(--ng);border-color:var(--bng);color:var(--tng)}

/* ── ポリモーフィズム ── */
.poly-area{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1rem}
.poly-card{background:var(--s2);border:2px solid var(--bd);border-radius:12px;padding:.75rem .5rem;text-align:center;transition:border-color .3s,background .3s,transform .3s}
.poly-card.active{border-color:var(--fac);background:var(--ac);transform:translateY(-4px)}
.poly-card.done{border-color:var(--bok);background:var(--ok)}
.poly-icon{font-size:22px;margin-bottom:.25rem}
.poly-class{font-size:11px;font-weight:500;margin-bottom:.3rem;color:var(--tp)}
.poly-method{font-size:9px;font-family:var(--m);color:var(--tm);background:var(--s1);border-radius:4px;padding:2px 5px;margin-bottom:.4rem;display:inline-block}
.poly-impl{font-size:9px;font-family:var(--m);color:var(--tac);background:var(--ac);border-radius:4px;padding:2px 5px;margin-bottom:3px;opacity:0;transition:opacity .4s}
.poly-impl.show{opacity:1}
.poly-result{font-size:11px;font-weight:500;color:var(--tok);opacity:0;transition:opacity .4s}
.poly-result.show{opacity:1}
.poly-dispatch{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:.75rem 1rem;font-family:var(--m);font-size:12px;line-height:2;margin-bottom:1rem}


/* ── 序章：継承ツリー図 ── */
.g0-tree-wrap{background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:1rem;margin-bottom:1rem;overflow-x:auto;-webkit-overflow-scrolling:touch}
.g0-tree-caption{font-size:12px;font-weight:700;color:var(--tp);margin-bottom:.35rem}
.g0-tree-note{font-size:12px;color:var(--ts);line-height:1.6;margin-bottom:.75rem}
.g0-tree{min-width:650px;text-align:center;padding:.25rem 0 .5rem}
.g0-row{display:flex;justify-content:center;gap:16px;align-items:flex-start}
.g0-row.mid{justify-content:space-between}
.g0-family{width:31%;display:flex;flex-direction:column;align-items:center;position:relative}
.g0-tree-node{background:var(--s2);border:2px solid var(--bds);border-radius:8px;overflow:hidden;min-width:120px;box-shadow:0 1px 0 rgba(0,0,0,.04)}
.g0-tree-node.movable{border-color:var(--tpr)}
.g0-tree-node.animal{border-color:var(--bok)}
.g0-tree-node.vehicle{border-color:var(--bac)}
.g0-tree-node.machine{border-color:var(--bwn)}
.g0-tree-node.leaf{min-width:72px;font-size:11px}
.g0-node-title{font-weight:700;font-size:13px;padding:5px 8px;background:var(--s0);border-bottom:1px solid var(--bd)}
.g0-tree-node.movable .g0-node-title{background:var(--pr);color:var(--tpr)}
.g0-tree-node.animal .g0-node-title{background:var(--ok);color:var(--tok)}
.g0-tree-node.vehicle .g0-node-title{background:var(--ac);color:var(--tac)}
.g0-tree-node.machine .g0-node-title{background:var(--wn);color:var(--twn)}
.g0-node-sub{font-size:10px;color:var(--tm);padding:3px 8px 0;font-family:var(--m)}
.g0-node-items{font-family:var(--m);font-size:10px;line-height:1.55;color:var(--ts);padding:4px 8px 6px;text-align:left}
.g0-arrow{font-size:18px;color:var(--ts);line-height:1;margin:.25rem 0 .1rem}
.g0-arrow.up{margin:.25rem 0 0}
.g0-branch{height:16px;border-top:2px solid var(--ts);border-left:2px solid var(--ts);border-right:2px solid var(--ts);width:68%;margin:0 auto -1px}
.g0-mini-branch{height:12px;border-top:2px solid var(--ts);border-left:2px solid var(--ts);border-right:2px solid var(--ts);width:72%;margin:0 auto -1px}
.g0-leaves{display:flex;gap:6px;justify-content:center;align-items:flex-start;width:100%}
.g0-tree-tip{background:var(--wn);border:1px solid var(--bwn);border-radius:8px;padding:.65rem .8rem;font-size:12px;color:var(--twn);line-height:1.7;margin-top:.75rem}
@media(max-width:500px){
  .g0-tree-wrap{padding:.85rem}
  .g0-tree{min-width:0}
  .g0-row.mid{flex-direction:column;gap:18px}
  .g0-family{width:100%;max-width:280px}
  .g0-branch.branch-top{width:2px;height:18px;border:none;border-left:2px solid var(--ts);margin:0 auto}
  .g0-tree-node{min-width:96px}
  .g0-tree-node.leaf{min-width:66px;font-size:10px}
  .g0-node-items{font-size:9px}
}

/* ── 抽象クラス ── */
.abs-badge{display:inline-block;font-size:10px;padding:1px 6px;border-radius:4px;margin-left:6px;font-style:italic;background:var(--pr);color:var(--tpr)}

/* ── static ── */
.accounts{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem}
.acc-card{background:var(--s2);border:1px solid var(--bd);border-radius:12px;padding:.75rem .5rem;text-align:center}
.acc-icon{font-size:22px;margin-bottom:.3rem}
.acc-name{font-size:10px;font-weight:500;margin-bottom:.5rem}
.acc-field{font-size:10px;font-family:var(--m);padding:3px 6px;border-radius:4px;margin-bottom:3px;display:flex;justify-content:space-between;gap:4px;align-items:center}
.acc-field.static-f{background:var(--wn);color:var(--twn)}
.acc-field.inst-f{background:var(--s1);color:var(--ts)}
.acc-val{font-weight:500;font-size:10px;text-align:right;flex-shrink:0}
.ctrl-box{border-radius:var(--r);padding:.875rem 1rem;margin-bottom:.75rem;font-size:14px}
.ctrl-box.static-ctrl{background:var(--wn);border:1px solid var(--bwn);display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.ctrl-box.inst-ctrl{background:var(--s1);border:1px solid var(--bd)}
.ctrl-box span.label{font-weight:500}
.static-ctrl span.label{color:var(--twn)}
.inst-ctrl span.label{color:var(--ts);font-size:13px}
.inst-btns{display:flex;gap:6px;flex-wrap:wrap;margin-top:.5rem}
.inst-btn{padding:8px 12px;border:1px solid var(--bds);border-radius:var(--r);font-size:12px;cursor:pointer;background:var(--s2);font-family:var(--f);touch-action:manipulation}
.inst-btn:hover{background:var(--s1)}

.fb{border-radius:var(--r);padding:.875rem 1rem;font-size:14px;line-height:1.6;margin-bottom:1rem;display:none}
.fb.show{display:block}
.fb.ok{background:var(--ok);color:var(--tok);border:1px solid var(--bok)}
.fb.ng{background:var(--ng);color:var(--tng);border:1px solid var(--bng)}
.info-box{background:var(--ac);border:1px solid var(--bac);border-radius:var(--r);padding:.75rem 1rem;font-size:13px;color:var(--tac);margin-bottom:1rem;line-height:1.8}
.code-sample{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:.75rem 1rem;font-family:var(--m);font-size:12px;line-height:1.75;white-space:pre-wrap;overflow:auto;margin-bottom:1rem}
.lesson-point{background:var(--wn);border:1px solid var(--bwn);color:var(--twn);border-radius:var(--r);padding:.7rem 1rem;font-size:13px;line-height:1.75;margin-bottom:1rem}

.complete{text-align:center;padding:2rem 0}
.complete h2{font-size:22px;font-weight:500;margin-bottom:.5rem}
.big-score{font-size:48px;font-weight:500;color:var(--fac);margin:.5rem 0}
.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin:1.25rem 0;text-align:left}
.sum-card{background:var(--s2);border:1px solid var(--bd);border-radius:12px;padding:.75rem 1rem}
.sum-card strong{display:block;font-size:13px;margin-bottom:4px;color:var(--tp)}
.sum-card p{color:var(--ts);line-height:1.6;font-size:12px}

@media(max-width:500px){
  .worlds{grid-template-columns:1fr}
  .poly-area{grid-template-columns:1fr}
  .m-name{font-size:11px}
  .ctrl-box.static-ctrl{flex-direction:column;align-items:flex-start}
}


/* ===== Screenshot-like RPG UI polish ===== */
:root{
  --bg-a:#0d1b25;--bg-b:#142938;--bg-c:#09131b;
  --paper:#fffdf9;--paper2:#f8fbff;--ink:#162232;--muted:#657587;
  --line:#cbd6e2;--blue:#1678c8;--green:#1aa85a;--gold:#ffd44a;
  --dark-panel:rgba(25,39,49,.92);--dark-panel2:rgba(18,30,39,.96);
  --side-line:rgba(255,255,255,.18);
  --shadow:0 18px 45px rgba(0,0,0,.35);
}
@media(prefers-color-scheme:dark){:root{--s0:#eef3f8;--s1:#f7fbff;--s2:#fff;--tp:#182536;--ts:#5d6b7b;--tm:#8a98a8;--bd:rgba(10,35,60,.16);--bds:rgba(10,35,60,.28)}}
body{display:block;min-height:100vh;padding:0;background:radial-gradient(circle at 20% 0%,#29465a 0,#122838 34%,#09141d 100%);color:var(--ink);font-weight:650;}
body::before{content:"";position:fixed;inset:0;pointer-events:none;background:linear-gradient(120deg,rgba(255,255,255,.06),transparent 35%,rgba(255,255,255,.035));}
.wrap{max-width:none;width:auto}.top-bar,.progress{display:none!important}
.app-shell{min-height:100vh;display:flex;flex-direction:column;gap:10px;padding:8px 10px 10px;}
.game-header{height:86px;display:grid;grid-template-columns:310px 1fr auto;gap:18px;align-items:center;color:#fff;}
.brand-title{font-size:28px;line-height:1.05;font-weight:950;letter-spacing:.02em;color:#ffdf5a;text-shadow:0 2px 0 rgba(0,0,0,.35);white-space:nowrap;}
.brand-sub{font-size:14px;margin-top:5px;color:#fff;font-weight:900}.brand-sub::before{content:"🐾 ";}
.chapter-title{font-size:18px;font-weight:950;margin-bottom:9px;color:#fff;display:flex;align-items:center;gap:14px}.step-num{color:#5eed97;font-size:20px;letter-spacing:.08em;white-space:nowrap}.head-progress{height:18px;background:rgba(255,255,255,.22);border-radius:999px;overflow:hidden;box-shadow:inset 0 2px 4px rgba(0,0,0,.28)}
.head-progress-fill{height:100%;width:0;background:linear-gradient(90deg,#96f7c8,#2ec66e);border-radius:999px;transition:width .3s;position:relative}.head-progress-fill::after{content:"";position:absolute;inset:0;background:repeating-linear-gradient(90deg,rgba(255,255,255,.28) 0 26px,transparent 26px 42px)}
.header-actions{display:flex;align-items:center;gap:14px}.score-box{height:64px;padding:8px 18px;border:1px solid rgba(255,255,255,.28);background:rgba(255,255,255,.10);border-radius:10px;text-align:center;min-width:150px;box-shadow:inset 0 0 0 1px rgba(0,0,0,.18)}.score-label{font-size:13px;color:#eaf4ff}.score-val{font-size:21px;color:#ffe15d;font-weight:950;margin-top:3px}.head-btn{height:50px;padding:0 18px;border:2px solid rgba(255,255,255,.78);border-radius:9px;background:rgba(0,0,0,.18);color:#fff;font-size:15px;font-weight:900;cursor:pointer;box-shadow:0 2px 0 rgba(0,0,0,.26)}

/* ===== Character dialogue system ===== */
.dialog-scene{
  display:flex;
  flex-direction:column;
  gap:8px;
  margin:12px 0 16px;
}
.dialog-row{
  display:grid;
  grid-template-columns:132px minmax(0,1fr);
  gap:12px;
  align-items:stretch;
  border:1px solid #cbd6e2;
  background:linear-gradient(180deg,#ffffff,#f8fbff);
  border-radius:10px;
  padding:10px 12px;
  box-shadow:inset 0 1px 0 #fff,0 2px 0 rgba(20,45,70,.04);
}
.dialog-row.right{
  grid-template-columns:minmax(0,1fr) 144px;
}
.dialog-row.right .dialog-character{order:2}
.dialog-row.right .dialog-bubble{order:1}
.dialog-character{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-end;
  min-width:0;
}
.dialog-character img{
  width:112px;
  max-width:100%;
  height:auto;
  display:block;
  object-fit:contain;
  filter:drop-shadow(0 3px 2px rgba(0,0,0,.12));
}
.dialog-name{
  margin-top:-2px;
  padding:4px 12px;
  border-radius:7px;
  color:#fff;
  font-weight:950;
  font-size:13px;
  line-height:1.2;
  box-shadow:0 2px 0 rgba(0,0,0,.16);
  white-space:nowrap;
}
.dialog-name.cat{background:linear-gradient(#4e9548,#2d7332)}
.dialog-name.rabbit{background:linear-gradient(#e78091,#ca5368)}
.dialog-bubble{
  position:relative;
  align-self:center;
  background:#fff;
  border:1px solid #cbd6e2;
  border-radius:12px;
  padding:13px 16px;
  color:#172235;
  font-size:15px;
  line-height:1.85;
  font-weight:800;
  min-height:84px;
  display:flex;
  flex-direction:column;
  justify-content:center;
}
.dialog-bubble::before{
  content:"";
  position:absolute;
  left:-10px;
  top:50%;
  transform:translateY(-50%);
  width:0;height:0;
  border-top:10px solid transparent;
  border-bottom:10px solid transparent;
  border-right:10px solid #cbd6e2;
}
.dialog-bubble::after{
  content:"";
  position:absolute;
  left:-8px;
  top:50%;
  transform:translateY(-50%);
  width:0;height:0;
  border-top:9px solid transparent;
  border-bottom:9px solid transparent;
  border-right:9px solid #fff;
}
.dialog-row.right .dialog-bubble::before{
  left:auto;right:-10px;
  border-right:0;
  border-left:10px solid #cbd6e2;
}
.dialog-row.right .dialog-bubble::after{
  left:auto;right:-8px;
  border-right:0;
  border-left:9px solid #fff;
}
.dialog-bubble strong,.dialog-bubble .hot{color:#d61e1e;font-weight:950}
.dialog-bubble .blue{color:#0967ae;font-weight:950}
.dialog-choice-panel{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:10px;
  margin:12px 0 16px;
}
.design-slot{
  background:#fff;
  border:2px solid #d5dde8;
  border-radius:10px;
  min-height:88px;
  padding:10px 12px;
  box-shadow:inset 0 1px 0 #fff;
}
.design-slot.good{border-color:#a35ff2;background:#fbf7ff}
.design-slot-title{font-weight:950;font-size:14px;margin-bottom:6px;color:#162232}
.design-slot-sub{font-family:var(--m);font-size:12px;line-height:1.8;color:#4b5d70;font-weight:800}
@media(max-width:700px){
  .dialog-row,.dialog-row.right{grid-template-columns:88px minmax(0,1fr);padding:8px;gap:8px}
  .dialog-row.right .dialog-character{order:0}
  .dialog-row.right .dialog-bubble{order:1}
  .dialog-character img{width:82px}
  .dialog-name{font-size:11px;padding:3px 8px}
  .dialog-bubble{font-size:13px;line-height:1.7;padding:10px 12px;min-height:70px}
  .dialog-row.right .dialog-bubble::before{left:-10px;right:auto;border-left:0;border-right:10px solid #cbd6e2}
  .dialog-row.right .dialog-bubble::after{left:-8px;right:auto;border-left:0;border-right:9px solid #fff}
  .dialog-choice-panel{grid-template-columns:1fr}
}



/* ===== 不自然な途中改行の抑制 =====
   用語・メソッド名だけが1語で次行に送られないようにする */
.dialog-bubble,
.bubble,
.game-intro,
.lesson-point,
.fb,
.info-box,
.footer-tip,
.g0-tree-note,
.g0-tree-tip,
.sum-card p{
  line-break: strict;
  word-break: auto-phrase;
  overflow-wrap: normal;
  text-wrap: pretty;
}
@supports not (word-break: auto-phrase){
  .dialog-bubble,.bubble,.game-intro,.lesson-point,.fb,.info-box,.footer-tip,.g0-tree-note,.g0-tree-tip,.sum-card p{
    word-break: normal;
  }
}
.gloss-term,
.dialog-bubble strong,
.dialog-bubble code,
.bubble strong,
.bubble code,
.game-intro strong,
.lesson-point strong,
.fb strong,
.info-box strong,
code{
  white-space: nowrap;
  word-break: keep-all;
}
.jp-nobr{
  white-space: nowrap;
  word-break: keep-all;
  display:inline;
}
.jp-phrase{
  white-space: nowrap;
  word-break: keep-all;
  display:inline;
}
.m-name{
  word-break: keep-all;
  overflow-wrap: normal;
}

/* スマホ幅：長い用語がnowrapで画面外にはみ出るのを防ぐ（iOS Safariで実機確認） */
@media(max-width:700px){
  .dialog-bubble,.bubble,.game-intro,.lesson-point,.fb,.info-box,.footer-tip,.g0-tree-note,.g0-tree-tip,.sum-card p{
    word-break: normal;
    overflow-wrap: anywhere;
  }
  .gloss-term,
  .dialog-bubble strong,.dialog-bubble code,
  .bubble strong,.bubble code,
  .game-intro strong,.lesson-point strong,.fb strong,.info-box strong,
  code,
  .jp-nobr,.jp-phrase{
    white-space: normal;
    overflow-wrap: anywhere;
  }
}

/* サイドナビ収納：アイコンだけ残す（タブレット幅） */
.app-shell.side-collapsed .game-layout{grid-template-columns:64px minmax(0,1fr)}
.app-shell.side-collapsed .side-panel{width:64px}
.app-shell.side-collapsed .side-head{justify-content:center;padding:8px 6px}
.app-shell.side-collapsed .side-head-text{display:none}
.app-shell.side-collapsed .step-list{display:flex;flex-direction:column}
.app-shell.side-collapsed .side-step{grid-template-columns:1fr;justify-items:center;min-height:58px;padding:8px 4px;gap:0}
.app-shell.side-collapsed .side-step>div:nth-child(2),
.app-shell.side-collapsed .side-step>div:nth-child(3),
.app-shell.side-collapsed .side-actions,
.app-shell.side-collapsed .gloss-box{display:none}
.app-shell.side-collapsed .paw{font-size:22px}
.app-shell.side-collapsed .side-step.active{outline-offset:-4px}
.side-backdrop{display:none}
@media(max-width:900px){
  .app-shell{padding:8px;gap:8px;max-width:100vw;overflow-x:hidden}
  .game-header{height:auto;grid-template-columns:1fr;gap:10px}
  .brand-title{font-size:24px}
  .header-actions{flex-wrap:wrap;gap:8px}
  .game-layout{grid-template-columns:64px minmax(0,1fr);gap:8px;min-width:0}
  .app-shell:not(.side-collapsed) .game-layout{grid-template-columns:220px minmax(0,1fr)}
  .side-panel{display:block;order:0;position:sticky;top:8px}
  .side-head{padding:10px 12px}
  .step-list{display:flex;flex-direction:column}
  .side-step{min-height:58px;padding:8px;grid-template-columns:24px 1fr 20px}
  .paw{font-size:17px}.step-main{font-size:13px}.step-sub{font-size:11px}
  .side-actions,.gloss-box{display:none}
  .main-area{min-height:auto;padding:12px 10px;max-width:100%}
  .game-footer{grid-template-columns:1fr;gap:8px}.footer-actions{grid-template-columns:1fr 1fr;width:100%}.footer-prev,.footer-next{width:100%}
}
/* スマホ幅：サイドナビは完全に隠し、開くときだけ画面に重なるドロワーとして表示する */
@media(max-width:700px){
  .game-layout{grid-template-columns:1fr;gap:0}
  .app-shell.side-collapsed .game-layout,
  .app-shell:not(.side-collapsed) .game-layout{grid-template-columns:1fr}
  .side-panel{
    position:fixed;top:0;left:0;order:0;
    width:min(82vw,300px);height:100vh;height:100dvh;
    border-radius:0;
    transform:translateX(-100%);
    transition:transform .25s ease;
    box-shadow:10px 0 30px rgba(0,0,0,.45);
    overflow-y:auto;
    z-index:80;
  }
  .app-shell.side-collapsed .side-panel{width:min(82vw,300px);transform:translateX(-100%)}
  .app-shell:not(.side-collapsed) .side-panel{transform:translateX(0)}
  .side-backdrop{
    display:none;position:fixed;inset:0;background:rgba(6,12,18,.55);z-index:70;
  }
  .app-shell:not(.side-collapsed) .side-backdrop{display:block}
}

<body>
<div class="app-shell">
  <header class="game-header">

<script>
const G={chapter:0,phase:'story',line:0,score:0};
const history=[];

const CHAPTERS=[{name:'序章',sub:'OOP体験版：動物園を完成させよう'}];

const GLOSSARY=[
  {term:'クラス',def:'オブジェクトの設計図。動物クラスのように、データと動作をまとめたもの。'},
  {term:'オブジェクト',def:'クラスから作られた実体。犬のポチ、猫のミケのような一つひとつの存在。'},
  {term:'インスタンス',def:'クラスから作られた実体。new 犬() で作られる一匹一匹がインスタンス。'},
  {term:'コンストラクタ',def:'インスタンスを作るときに初期値をセットする特別な処理。名前や初期体力などを決める。'},
  {term:'フィールド',def:'クラスが持つデータ。名前、体力、空腹度など。'},
  {term:'メソッド',def:'クラスが持つ動作。食べる、歩く、鳴くなど。'},
  {term:'メンバー',def:'クラスが持つフィールドとメソッドの総称。'},
  {term:'アクセス修飾子',def:'public / private / protected のこと。誰がそのメンバーに触れるかを決める。'},
  {term:'public',def:'外部から使える。公開された窓口。'},
  {term:'private',def:'クラス自身だけが使える。外部から勝手に触らせたくないデータに使う。'},
  {term:'protected',def:'自分自身と子クラスから使える。継承先にだけ見せたい時に使う。'},
  {term:'継承',def:'親クラスの性質を子クラスが引き継ぐ仕組み。「犬は動物の一種」のような is-a 関係。'},
  {term:'static',def:'インスタンスごとではなくクラス全体に属する値。動物の総数のように全体で1つあればよいものに使う。'},
  {term:'is-a',def:'「〇〇は△△の一種」と言える関係。継承を使う目安。'},
  {term:'カプセル化',def:'データを外部から直接触れないように隠し、メソッドだけを窓口にする考え方。'},
  {term:'ポリモーフィズム',def:'親型でまとめて扱っても、実際の中身に応じて違う処理が呼ばれる仕組み。'},
  {term:'オーバーライド',def:'親クラスで決めたメソッドを、子クラスで自分用に実装し直すこと。'},

  {term:'型キャスト',def:'親型として扱っていたものを、必要に応じて具体的な子クラス型として扱い直す操作。'},
  {term:'ダウンキャスト',def:'親クラス型から子クラス型へ戻す型キャスト。'},
  {term:'instanceof',def:'実際の中身が特定の型かどうか確認する演算子。安全にダウンキャストする前に使う。'},
  {term:'例外処理',def:'エラーが起きた時にプログラムを安全に続けるための仕組み。'},
  {term:'throw',def:'例外を意図的に発生させるキーワード。'}
];

const CHAR_IMAGES={
  cat:"images/cat.png",
  catThink:"images/catThink.png",
  rabbit:"images/rabbit.png",
  rabbitThink:"images/rabbitThink.png"
};

// ─── GLOSSARY TOOLTIP ────────────────────────
function showGloss(el,term){
  const g=GLOSSARY.find(x=>x.term===term);
  if(!g)return;
  document.getElementById('gloss-term').textContent=g.term;
  document.getElementById('gloss-def').textContent=g.def;
  const pop=document.getElementById('gloss-popup');
  pop.style.display='block';
  const r=el.getBoundingClientRect();
  const pw=Math.min(280,window.innerWidth-32);
  let left=r.left;
  if(left+pw>window.innerWidth-8)left=window.innerWidth-pw-8;
  if(left<8)left=8;
  let top=r.bottom+6;
  pop.style.left=left+'px';
  pop.style.top=top+'px';
  pop.style.width=pw+'px';
}
function closeGloss(){document.getElementById('gloss-popup').style.display='none';}
document.addEventListener('click',e=>{
  if(!e.target.closest('#gloss-popup')&&!e.target.classList.contains('gloss-term'))closeGloss();
});
// テキスト内の用語をクリッカブルスパンに変換
// プレースホルダー方式: 置換済みテキスト内の部分一致を防ぐ
function glossify(html){
  const terms=['カプセル化','ポリモーフィズム','オーバーライド','抽象クラス','インターフェース','アクセス修飾子','コンストラクタ','ダウンキャスト','型キャスト','instanceof','例外処理','throw','オブジェクト','インスタンス','フィールド','メンバー','メソッド','クラス','継承','static','public','private','protected','is-a'];
  const ph=[];
  const parts=html.split(/(<[^>]+>)/);
  const withPh=parts.map((p,i)=>{
    if(i%2===1)return p;
    return terms.reduce((s,t)=>{
      if(!s.includes(t))return s;
      const idx=ph.length;
      ph.push(`<span class="gloss-term" onclick="showGloss(this,'${t}')">${t}</span>`);
      return s.split(t).join(`\x00${idx}\x00`);
    },p);
  }).join('');
  return withPh.replace(/\x00(\d+)\x00/g,(_,i)=>ph[+i]);
}


// ─── PAGE TRANSITION SCROLL ─────────────────────
// ステップ切り替え時に前のスクロール位置を引き継がない。
// 「なんとかしたい」などを押したあと、必ず新しい画面の先頭から読めるようにする。
function scrollToMainTop(behavior='smooth'){
  const main=document.getElementById('main-area') || document.getElementById('screen');
  if(!main)return;
  const reduced=window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const b=reduced?'auto':behavior;
  requestAnimationFrame(()=>{
    if(typeof main.scrollTo==='function') main.scrollTo({top:0,behavior:b});
    else main.scrollTop=0;
    const y=main.getBoundingClientRect().top + window.pageYOffset - 8;
    window.scrollTo({top:Math.max(0,y),behavior:b});
    try{main.focus({preventScroll:true});}catch(e){}
  });
}
function scrollToSection(id,behavior='smooth'){
  const el=document.getElementById(id);
  const main=document.getElementById('main-area') || document.getElementById('screen');
  if(!el){scrollToMainTop(behavior);return;}
  const reduced=window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const b=reduced?'auto':behavior;
  requestAnimationFrame(()=>{
    if(main && typeof main.scrollTo==='function'){
      const top=el.offsetTop-12;
      main.scrollTo({top:Math.max(0,top),behavior:b});
    }
    const y=el.getBoundingClientRect().top + window.pageYOffset - 8;
    window.scrollTo({top:Math.max(0,y),behavior:b});
    try{el.setAttribute('tabindex','-1');el.focus({preventScroll:true});}catch(e){}
  });
}

function updateNav(){
  const steps=[
    ['同じものを3回書いている','（クラスと重複）'],
    ['動物という共通の親','（継承）'],
    ['鳴くは親には書けない','（抽象クラス・オーバーライド）'],

    ['外から守る','（アクセス修飾子とカプセル化）'],
    ['初期設定と共有値','（コンストラクタ・static）'],
    ['動物園システム完成','（まとめ）']
  ];
  const step=currentStep();
  const nav=document.getElementById('ch-nav');
  if(nav){
    nav.innerHTML=steps.map((it,i)=>{
      const n=i+1; const cl=n<step?'done':n===step?'active':'upcoming';
      const mark=n<step?'<span class="check">●</span>':n===step?'':'<span class="lock">○</span>';
      return `<div class="side-step ${cl}" role="button" tabindex="0" onclick="jumpToStep(${n})" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();jumpToStep(${n})}" title="${n} / 8 ${it[0]} ${it[1]}へ移動"><div class="paw">🐾</div><div><div class="step-main">${n} / 8</div><div class="step-sub">${it[0]}<br>${it[1]}</div></div><div>${mark}</div></div>`;
    }).join('');
  }
  const pct=(step/8)*100;
  const prog=document.getElementById('prog'); if(prog) prog.style.width=pct+'%';
  const hs=document.getElementById('head-step'); if(hs) hs.textContent=`STEP ${step} / 8`;
  const sc=document.getElementById('score-now'); if(sc) sc.textContent=G.score;
  const disabled=history.length===0;
  ['back-btn','footer-prev-btn','side-back-btn'].forEach(id=>{
    const btn=document.getElementById(id);
    if(btn) btn.disabled=disabled;
  });
}

function makeDefaultG0State(){
  return {phase:0,sounds:{},moveTried:false,movableOk:false,access:{},accessChecked:false,polyRun:false,castTried:false,ctor:{name:'ポチ',hp:80,hunger:50,toy:'ボール'},ctorMade:false};
}
let g0st=makeDefaultG0State();

function g0do(act,p){
  const isChoiceOnly=['sound','access'].includes(act);
  // ページ移動や結果表示の前には、直前の状態を履歴に残す。
  // 鳴き声やアクセス修飾子の単なる選択は「前のページ」の対象にしない。
  if(!isChoiceOnly) saveHistory();

  if(act==='next') g0st.phase++;
  else if(act==='sound') g0st.sounds[p.who]=p.s;
  else if(act==='moveTry') g0st.moveTried=true;
  else if(act==='movable'){g0st.movableOk=true;}
  else if(act==='access'){g0st.access[p.name]=p.mod; g0st.accessChecked=false;}
  else if(act==='accessCheck'){g0st.accessChecked=true;}
  else if(act==='polyRun'){g0st.polyRun=true;}
  else if(act==='castTry'){g0st.castTried=true;}
  document.getElementById('screen').innerHTML=renderG0();
  protectLineBreaksInScreen(document.getElementById('screen'));
  updateNav();
  // 選択肢を押しただけのときは画面を動かさない。
  // ステップ移動・結果表示のときは、新しく出た内容を読み飛ばさないよう先頭へ移動。
  if(!isChoiceOnly){
    if(act==='castTry') scrollToSection('cast-dialogue-start');
    else if(act==='moveTry') scrollToSection('inheritance-tree-start');
    else if(act==='accessCheck') scrollToSection('access-test-result');
    else scrollToMainTop();
  }
}

function clampNum(v,min,max,fallback){
  const n=Number(v);
  if(!Number.isFinite(n))return fallback;
  return Math.max(min,Math.min(max,Math.round(n)));
}

function tidyDialogueJapanese(html){
  // 会話文は読みやすさ優先。短い用語リンクが文節を分断しやすいため、
  // 会話内では用語リンク化せず、自然な禁則処理を優先する。
  let out = html
    .replace(/([\u3040-\u30ff\u3400-\u9fff\u3005\u3006\u30fc、。！？「」（）])\s+(<(?:strong|code|span)\b[^>]*>)/g,'$1$2')
    .replace(/(<\/(?:strong|code|span)>)\s+([\u3040-\u30ff\u3400-\u9fff\u3005\u3006\u30fc、。！？「」（）])/g,'$1$2');
  out = protectKnownPhrasesInHtml(out);
  out = protectKnownPhrasesInHtml(out);
  out = smoothJapaneseInlineHtml(out);
  out = protectKnownPhrasesInHtml(out);
  out = smoothJapaneseInlineHtml(out);
  return out;
}

function smoothJapaneseInlineHtml(html){
  let out = html.replace(/\u2060/g,'');
  // 開き括弧だけが行末に残るのを防ぐ。
  out = out
    .replace(/([「『（\(])\s*<(strong|code)(\b[^>]*)>/g, '<$2$3>$1')
    .replace(/([「『（\(])\s*(<span\b[^>]*>)/g, '$2$1');

  // 閉じ括弧は、対応する開き括弧を上ですでに要素の中へ入れているため、
  // 揃えて要素の中へ吸収する（「クラス」のように括弧ごと強調・クリック対象にする）。
  const bracketClose = '(?:[）\\)］\\]｝\\}」』】〉》〕〗〙〛])';
  // 通常の句読点も、強調やクリック可能な用語の色・下線が句読点にまで
  // 掛かって見えるのは不自然なため、タグの外側に残したまま改行だけ防ぐ。
  const punct = '(?:[、。，．｡､！？!?：；;・])';
  // 助詞は、タグの外側に残したまま改行だけ防ぐ。強調(<strong>)やクリック可能な
  // 用語(<span class="gloss-term">)の範囲に助詞まで巻き込まないよう、要素の中へは吸収しない。
  // 例: <span>クラス</span>を → <span class="jp-nobr"><span>クラス</span>を</span>
  // ※ 「の・を・が」など1文字の助詞は「できる」「もし」等、別の単語の先頭とも
  //   区別が付かず、無理にまとめると単語の途中で改行される副作用があるため対象外にする。
  const particle = '(?:から|まで|だけ|には|では|とは|なら|より)';
  const wrapOutside = (m,already,tag,ws,suf) => already ? m : `<span class="jp-nobr">${tag}${suf}</span>`;
  for(let i=0;i<8;i++){
    const before = out;
    out = out.replace(new RegExp('(<(strong|code)\\b[^>]*>[\\s\\S]*?)(<\\/\\2>)(\\s*)('+bracketClose+')','g'), '$1$5$3');
    out = out.replace(new RegExp('(<span\\b[^>]*>[\\s\\S]*?)(<\\/span>)(\\s*)('+bracketClose+')','g'), '$1$4$2');
    out = out.replace(new RegExp('(<span class="jp-nobr">)?(<(?:strong|code)\\b[^>]*>[\\s\\S]*?<\\/(?:strong|code)>)(\\s*)('+particle+'|'+punct+')','g'), wrapOutside);
    out = out.replace(new RegExp('(<span class="jp-nobr">)?(<span\\b(?![^>]*jp-nobr)[^>]*>[\\s\\S]*?<\\/span>)(\\s*)('+particle+'|'+punct+')','g'), wrapOutside);
    if(out===before) break;
  }

  // よく出る引用＋メソッド名を一まとまりにする。
  out = out
    .replace(/「\s*(鳴く\(\)|食べる\(\)|寝る\(\)|歩く\(\)|走る\(\)|飛ぶ\(\)|泳ぐ\(\)|お手\(\))\s*」/g,'<span class="jp-nobr">「$1」</span>')
    .replace(/「\s*(鳴く\(\)|食べる\(\)|寝る\(\)|歩く\(\)|走る\(\)|飛ぶ\(\)|泳ぐ\(\)|お手\(\))\s*を/g,'<span class="jp-nobr">「$1を</span>')
    .replace(/「\s*同じ命令/g,'<span class="jp-nobr">「同じ命令</span>');
  return out;
}

function tidyInlineJapanese(html){
  const termSpan = term => `(<span\\b[^>]*class="[^"]*gloss-term[^"]*"[^>]*>${term}<\\/span>)`;
  let out = html
    .replace(/([\u3040-\u30ff\u3400-\u9fff\u3005\u3006\u30fc、。！？「」（）])\s+(<(?:strong|code|span)\b[^>]*>)/g,'$1$2')
    .replace(/(<\/(?:strong|code|span)>)\s+([\u3040-\u30ff\u3400-\u9fff\u3005\u3006\u30fc、。！？「」（）])/g,'$1$2')
    .replace(/(<span\b[^>]*class="[^"]*gloss-term[^"]*"[^>]*>[^<]+<\/span>)\s+([\u3040-\u30ff\u3400-\u9fff\u3005\u3006\u30fc、。！？「」（）])/g,'$1$2');

  // 用語リンクの直前だけが次行に送られるのを防ぐ。
  // 例: 「動物」+「クラス」、「親の」+「メソッド」、「同じ」+「フィールド」など。
  out = out
    .replace(new RegExp(`([A-Za-z0-9_ぁ-んァ-ヶ一-龯々ー]{1,14})${termSpan('クラス')}`,'g'), '<span class="jp-nobr">$1$2</span>')
    .replace(new RegExp(`([A-Za-z0-9_ぁ-んァ-ヶ一-龯々ーの]{1,14})${termSpan('メソッド')}`,'g'), '<span class="jp-nobr">$1$2</span>')
    .replace(new RegExp(`([A-Za-z0-9_ぁ-んァ-ヶ一-龯々ーの]{1,14})${termSpan('フィールド')}`,'g'), '<span class="jp-nobr">$1$2</span>')
    .replace(new RegExp(`([A-Za-z0-9_ぁ-んァ-ヶ一-龯々ーの]{1,14})${termSpan('オブジェクト')}`,'g'), '<span class="jp-nobr">$1$2</span>')
    .replace(new RegExp(`([A-Za-z0-9_ぁ-んァ-ヶ一-龯々ーの]{1,14})${termSpan('インスタンス')}`,'g'), '<span class="jp-nobr">$1$2</span>');

  // メソッド名や型名など、途中で割れると読みにくい短い語をまとめる。
  out = smoothJapaneseInlineHtml(out);
  out = protectKnownPhrasesInHtml(out);
  out = smoothJapaneseInlineHtml(out);
  return out;
}

function protectKnownPhrasesInHtml(html){
  const phrases = [
    '名前と食べる()', '食べる()、寝る()', '名前・食べる()・寝る()', '「鳴く()を必ず作ってね」', 'Animalで「鳴く()」', '「同じ命令を出したのに', '属性、できること', 'できることはメソッド', '共通部分を', '継承。', '上のクラス', '鳴く()を', 'Animalで「鳴く()」', 'を呼んだときに', '犬・猫・鳥', '同じ命令を', '同じ命令を出したのに', '名前を見るため', '外から参照', '外部から変更', '親のメソッド', '子クラスで', 'という親クラス', '動物クラスに', '名前などの属性', '食べる・寝る',
    '体力を減らす内部処理()', '現在の空腹度()', '現在の体力()', '名前を見る()',
    '鳴く()', '食べる()', '寝る()', '歩く()', '走る()', '飛ぶ()', '泳ぐ()', 'お手()', '爪とぎ()',
    'Animal型一覧', 'Animal型', 'Dog型', 'Cat型', 'Bird型',
    '動物一覧', '親クラス', '子クラス', '動物クラス', '犬クラス', '猫クラス', '鳥クラス',
    'Animalクラス', 'Dogクラス', 'Catクラス', 'Birdクラス', 'Vehicleクラス', 'Machineクラス',
    'Movableクラス', 'Flyableクラス', 'Swimmableクラス',
    'publicメソッド', 'privateフィールド', 'protectedメソッド', 'インスタンスフィールド',
    '同じ命令', '犬専用', '猫専用', '鳥専用', '正しい窓口', '共通部分', '共通処理',
    'アクセス修飾子', 'カプセル化', 'ポリモーフィズム', 'オーバーライド', 'インターフェース',
    'コンストラクタ', '抽象クラス', '抽象メソッド', '型キャスト', 'ダウンキャスト'
  ].sort((a,b)=>b.length-a.length);
  const esc = s => s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  const re = new RegExp(`(${phrases.map(esc).join('|')})`,'g');
  return html.split(/(<[^>]+>)/).map((part,i)=>{
    if(i%2===1)return part;
    return part.replace(re,'<span class="jp-nobr">$1</span>');
  }).join('');
}

function protectLineBreaksInScreen(root=document.getElementById('screen')){
  if(!root)return;
  const phrases=[
    '名前と食べる()', '食べる()、寝る()', '名前・食べる()・寝る()', '「鳴く()を必ず作ってね」', 'Animalで「鳴く()」', '「同じ命令を出したのに', '属性、できること', 'できることはメソッド', '共通部分を', '継承。', '上のクラス', '鳴く()を', 'Animalで「鳴く()」', 'を呼んだときに', '犬・猫・鳥', '同じ命令を', '同じ命令を出したのに', '名前を見るため', '外から参照', '外部から変更', '親のメソッド', '子クラスで', 'という親クラス', '動物クラスに', '名前などの属性', '食べる・寝る',
    '体力を減らす内部処理()', '現在の空腹度()', '現在の体力()', '名前を見る()',
    '鳴く()', '食べる()', '寝る()', '歩く()', '走る()', '飛ぶ()', '泳ぐ()', 'お手()', '爪とぎ()',
    'Animal型一覧', 'Animal型', 'Dog型', 'Cat型', 'Bird型', '動物一覧',
    '親クラス', '子クラス', '動物クラス', '犬クラス', '猫クラス', '鳥クラス',
    'Animalクラス', 'Dogクラス', 'Catクラス', 'Birdクラス', 'Vehicleクラス', 'Machineクラス',
    'Movableクラス', 'Flyableクラス', 'Swimmableクラス',
    'publicメソッド', 'privateフィールド', 'protectedメソッド', 'インスタンスフィールド',
    '同じ命令', '犬専用', '猫専用', '鳥専用', '正しい窓口', '共通部分', '共通処理',
    'アクセス修飾子', 'カプセル化', 'ポリモーフィズム', 'オーバーライド', 'インターフェース',
    'コンストラクタ', '抽象クラス', '抽象メソッド', '型キャスト', 'ダウンキャスト'
  ].sort((a,b)=>b.length-a.length);
  const esc=s=>s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  const re=new RegExp(`(${phrases.map(esc).join('|')})`,'g');
  const skip=new Set(['SCRIPT','STYLE','TEXTAREA','INPUT','SELECT','OPTION','CODE','PRE']);
  const walker=document.createTreeWalker(root,NodeFilter.SHOW_TEXT,{
    acceptNode(node){
      const parent=node.parentElement;
      if(!parent || skip.has(parent.tagName) || parent.closest('.jp-nobr,.gloss-term,.code-sample')) return NodeFilter.FILTER_REJECT;
      return re.test(node.nodeValue) ? (re.lastIndex=0, NodeFilter.FILTER_ACCEPT) : (re.lastIndex=0, NodeFilter.FILTER_REJECT);
    }
  });
  const nodes=[];
  while(walker.nextNode())nodes.push(walker.currentNode);
  nodes.forEach(node=>{
    const frag=document.createDocumentFragment();
    const parts=node.nodeValue.split(re);
    parts.forEach(part=>{
      if(!part)return;
      if(phrases.includes(part)){
        const span=document.createElement('span');
        span.className='jp-nobr';
        span.textContent=part;
        frag.appendChild(span);
      }else{
        frag.appendChild(document.createTextNode(part));
      }
    });
    node.parentNode.replaceChild(frag,node);
  });
  applyJapaneseKinsoku(root);
}

function g0inheritanceTree(){
  const node=(title,sub,items,kind)=>`
    <div class="g0-tree-node ${kind||''}">
      <div class="g0-node-title">${title}</div>
      ${sub?`<div class="g0-node-sub">${sub}</div>`:''}
      ${items&&items.length?`<div class="g0-node-items">${items.map(x=>`<div>${x}</div>`).join('')}</div>`:''}
    </div>`;
  const leaf=(title,items,kind)=>node(title,'',items,`leaf ${kind||''}`);
  return `
    <div class="g0-tree-wrap" id="inheritance-tree-start">
      <div class="g0-tree-caption">クラス図：継承だけで「動けるもの」をまとめた場合</div>
      <div class="g0-tree-note">白抜き三角の矢印は「下のクラスは上のクラスの一種」という <strong>is-a</strong> 関係を表します。</div>
      <div class="g0-tree">
        <div class="g0-row top">${node('動ける','<<抽象クラス>>',['+ 動く()'],'movable')}</div>
        <div class="g0-arrow up">△</div>
        <div class="g0-branch branch-top"></div>
        <div class="g0-row mid">
          <div class="g0-family animal">
            ${node('Animal','<<抽象クラス>>',['+ 食べる()','+ 寝る()','+ 鳴く()'],'animal')}
            <div class="g0-arrow">△</div>

    ${movableOk?`
      <div class="lesson-point"><strong>解決：</strong>「Animal / Vehicle / Machine」は種類の親クラス。「Movable / Flyable / Swimmable」は能力のインターフェースにする。</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1rem">
        <div>${g0card('種類：抽象クラス・継承',['Animal → 犬・猫・鳥','Vehicle → 車・船・飛行機','Machine → ロボット・ドローン'],'var(--bok)')}</div>
        <div>${g0card('能力：インターフェース',['Movable：動ける','Flyable：飛べる','Swimmable：泳げる'],'var(--tpr)')}</div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem">
        ${[
          ['🐦 鳥','extends Animal','implements Movable, Flyable'],
          ['🐧 ペンギン','extends Animal','implements Movable, Swimmable'],
          ['🤖 ドローン','extends Machine','implements Movable, Flyable'],
        ].map(([t,a,b])=>g0card(t,[a,`<span style="color:var(--tpr)">${b}</span>`],'var(--bok)')).join('')}
      </div>
      <div class="fb ok show">✓ インターフェースの本質は、実装共有ではなく<strong>共通の型を作ること</strong>。種類が違っても「動けるもの」として同じ関数に渡せます。</div>
      <button class="btn btn-p" onclick="g0do('next')">次：外から守る →</button>`:''}`;

  // ── フェーズ5：アクセス修飾子 ──
  if(phase===5){
    const members=[
      {name:'名前',kind:'field',correct:'pri',hint:'外から参照したいが、勝手に変更されたくない'},
      {name:'体力',kind:'field',correct:'pri',hint:'勝手に変更されるとゲームバランスが壊れる'},
      {name:'空腹度',kind:'field',correct:'pri',hint:'外部から直接書き換えられると困る'},
      {name:'名前を見る()',kind:'method',correct:'pub',hint:'名前を表示するための安全な窓口'},
      {name:'食べる()',kind:'method',correct:'pub',hint:'正しい操作として外から呼びたい'},
      {name:'歩く()',kind:'method',correct:'pub',hint:'正しい操作として外から呼びたい'},
      {name:'体力を減らす内部処理()',kind:'method',correct:'pro',hint:'子クラスの走る・飛ぶからは使いたいが、外から直接呼ばせたくない'},
      {name:'現在の体力()',kind:'method',correct:'pub',hint:'見るための窓口'},
      {name:'現在の空腹度()',kind:'method',correct:'pub',hint:'見るための窓口'},
    ];
    members.forEach(m=>{ if(!g0st.access[m.name]) g0st.access[m.name]='pub'; });
    const allOk=members.every(m=>g0st.access[m.name]===m.correct);
    const modLabel={pub:'+ public',pri:'− private',pro:'# protected'};
    const modClass={pub:'mod-pub',pri:'mod-pri',pro:'mod-pro'};
    const row=m=>`<div class="m-row"><span class="m-name">${m.name}<br><small style="color:var(--tm);font-family:var(--f)">${m.hint}</small></span><div class="m-mod-btn">${['pub','pri','pro'].map(mod=>`<span class="mod-opt ${modClass[mod]} ${g0st.access[m.name]===mod?'sel':''}" onclick="g0do('access',{name:'${m.name}',mod:'${mod}'})">${modLabel[mod]}</span>`).join('')}</div></div>`;
    const attackLog=()=>{
      const namePublic=g0st.access['名前']==='pub';
      const hungerPublic=g0st.access['空腹度']==='pub';
      const hpPublic=g0st.access['体力']==='pub';
      const getNamePublic=g0st.access['名前を見る()']==='pub';
      const getHungerPublic=g0st.access['現在の空腹度()']==='pub';
      const eatPublic=g0st.access['食べる()']==='pub';
      const damageMod=g0st.access['体力を減らす内部処理()'];
      const damagePublic=damageMod==='pub';
      const damageProtected=damageMod==='pro';
      const damagePrivate=damageMod==='pri';
      return `<div style="display:grid;grid-template-columns:1fr;gap:8px;margin-bottom:1rem">
        <div class="${namePublic?'fb ng show':'fb ok show'}" style="display:block">👾 悪いプログラム：<code>ライオン.名前 = "名無し"</code><br>${namePublic?'💥 書き換え成功。表示名を勝手に変更されました。':'🛡 ブロック成功。外部から名前は直接変更できません。'}</div>
        <div class="${hungerPublic?'fb ng show':'fb ok show'}" style="display:block">👾 悪いプログラム：<code>ライオン.空腹度 = -999</code><br>${hungerPublic?'💥 書き換え成功。ライオンは永遠に満腹です。':'🛡 ブロック成功。外部から空腹度は変更できません。'}</div>
        <div class="${hpPublic?'fb ng show':'fb ok show'}" style="display:block">👾 悪いプログラム：<code>ライオン.体力 = 999999</code><br>${hpPublic?'💥 書き換え成功。ゲームバランスが壊れました。':'🛡 ブロック成功。外部から体力は直接変更できません。'}</div>
        <div class="${damagePublic?'fb ng show':'fb ok show'}" style="display:block">👾 外部プログラム：<code>ライオン.体力を減らす内部処理(999)</code><br>${damagePublic?'💥 直接呼べてしまいました。本来は内部用なので外に公開しすぎです。':'🛡 ブロック成功。内部処理は外部から直接呼べません。'}</div>
        <div class="${damageProtected?'fb ok show':'fb ng show'}" style="display:block">🐕 子クラスの利用：<code>Dog.走る()</code> の中から <code>体力を減らす内部処理(5)</code><br>${damageProtected?'✅ 子クラスのDogからは使えます。外には隠しつつ、継承先には使わせられます。':damagePrivate?'✗ private だと子クラスからも使えません。犬や鳥ごとに同じ体力処理を書き直すことになります。':'✗ public だと子クラスからは使えますが、外部からも直接呼べてしまいます。'}</div>
        <div class="${getNamePublic?'fb ok show':'fb ng show'}" style="display:block">👀 正しい利用：<code>ライオン.名前を見る()</code><br>${getNamePublic?'✅ 名前：レオ。見るための窓口は使えます。':'✗ 窓口まで閉じてしまったので、外から名前を表示できません。'}</div>
        <div class="${getHungerPublic?'fb ok show':'fb ng show'}" style="display:block">👀 正しい利用：<code>ライオン.現在の空腹度()</code><br>${getHungerPublic?'✅ 現在の空腹度：45。見るための窓口は使えます。':'✗ 窓口まで閉じてしまったので、外から状態確認できません。'}</div>
        <div class="${eatPublic?'fb ok show':'fb ng show'}" style="display:block">🍖 正しい利用：<code>ライオン.食べる("肉")</code><br>${eatPublic?'✅ 空腹度 45 → 20。private な値でも、クラス自身のメソッドなら中から変更できます。':'✗ 食べる窓口を閉じたので、外から正しい操作もできません。'}</div>
      </div>`;
    };
    return `
    <div class="ch-title">${CHAPTERS[0].name} — STEP 6 / 8</div>
    <div class="ch-heading">外から触っていいもの・ダメなもの</div>
    <p class="game-intro">次は<strong>カプセル化</strong>と<strong>アクセス修飾子</strong>。データを全部むき出しにせず、外部には「使っていい窓口」だけを公開する。</p>
    ${phaseDialogue(5)}
    <div class="lesson-point"><strong>考え方：</strong>名前・空腹度・体力は勝手に書き換えられると困るので <strong>private</strong>。外から使う正しい窓口は <strong>public</strong>。外部には見せないが子クラスには使わせたい内部処理は <strong>protected</strong>。</div>
    <div class="uml-class" style="margin-bottom:1rem"><div class="uml-head">動物</div><div class="uml-sec">${members.map(row).join('')}</div></div>
    <div class="info-box"><strong>public</strong>：外から使ってよい　/　<strong>private</strong>：自分の中だけ　/　<strong>protected</strong>：自分と子クラスだけ。<br><small>※ フィールドをpublicにすると、基本的には外から読み書きできてしまいます。参照だけさせたい値は、フィールドをprivateにして、見るためのpublicメソッドを用意します。protectedは「子クラスにだけ使わせたい共通処理」の例で使っています。</small></div>
    ${g0st.accessChecked?`<div id="access-test-result"></div>${attackLog()}`:''}
    ${g0st.accessChecked
      ? `<div class="${allOk?'fb ok show':'fb ng show'}">${allOk?'✓ 完璧！':'✗ まだ危険な設定があります。'}<br>直接は変更できない。でも見るための窓口から参照できる。さらに、子クラスだけに使わせたい処理はprotectedにできる。これがアクセス修飾子によるカプセル化です。</div><div style="display:flex;gap:8px;flex-wrap:wrap"><button class="btn btn-p" ${allOk?'':'disabled'} onclick="g0do('next')">次：生まれた瞬間の初期設定 →</button><button class="btn" onclick="g0st.accessChecked=false;document.getElementById('screen').innerHTML=renderG0();">設定し直す ↩</button></div>`
      : `<button class="btn btn-p" onclick="g0do('accessCheck')">この設定でテストする 🧪</button>`}`;
  }

  // ── フェーズ6：コンストラクタ・static ──
  if(phase===6){
    const c=g0st.ctor||{name:'ポチ',hp:80,hunger:50,toy:'ボール'};
    const name=htmlSafe(c.name||'ポチ');
    const hp=Number.isFinite(Number(c.hp))?Number(c.hp):80;
    const hunger=Number.isFinite(Number(c.hunger))?Number(c.hunger):50;
    const toy=htmlSafe(c.toy||'ボール');
    const count=g0st.ctorMade?1:0;
    return `
    <div class="ch-title">${CHAPTERS[0].name} — STEP 7 / 8</div>
    <div class="ch-heading">初期値を入れて、インスタンスを生み出す</div>
    <p class="game-intro"><strong>コンストラクタ</strong>は、<code>new</code> で<strong>オブジェクト</strong>が生まれる瞬間に初期値を入れる仕組み。<strong>static</strong> は、個体ではなくクラス全体で共有する値。</p>
    ${phaseDialogue(6)}

    <div class="lesson-point"><strong>今回の体験：</strong>名前・体力・空腹度・好きな遊びを指定して、<code>new Dog(...)</code> の結果を作ってみよう。入力した値が、そのまま生まれた犬の初期状態になります。</div>

    <div style="display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:10px;margin-bottom:1rem">
      <div style="background:var(--s2);border:1px solid var(--bd);border-radius:12px;padding:1rem">
        <div style="font-size:13px;font-weight:700;color:var(--tp);margin-bottom:.75rem">🐕 new Dog() に渡す初期値</div>
        <label style="display:block;font-size:12px;color:var(--ts);margin-bottom:.45rem">名前
          <input id="ctor-name" value="${name}" style="width:100%;margin-top:.25rem;border:1px solid var(--bd);border-radius:8px;padding:.55rem .65rem;background:var(--s1);color:var(--tp);font-family:var(--f)">
        </label>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
          <label style="display:block;font-size:12px;color:var(--ts);margin-bottom:.45rem">体力
            <input id="ctor-hp" type="number" min="1" max="999" value="${hp}" style="width:100%;margin-top:.25rem;border:1px solid var(--bd);border-radius:8px;padding:.55rem .65rem;background:var(--s1);color:var(--tp);font-family:var(--f)">
          </label>
          <label style="display:block;font-size:12px;color:var(--ts);margin-bottom:.45rem">空腹度
            <input id="ctor-hunger" type="number" min="0" max="100" value="${hunger}" style="width:100%;margin-top:.25rem;border:1px solid var(--bd);border-radius:8px;padding:.55rem .65rem;background:var(--s1);color:var(--tp);font-family:var(--f)">
          </label>
        </div>
        <label style="display:block;font-size:12px;color:var(--ts);margin-bottom:.75rem">好きな遊び
          <input id="ctor-toy" value="${toy}" style="width:100%;margin-top:.25rem;border:1px solid var(--bd);border-radius:8px;padding:.55rem .65rem;background:var(--s1);color:var(--tp);font-family:var(--f)">
        </label>
        <button class="btn btn-p" onclick="g0createDog()">この初期値で new Dog() する 🐕</button>
      </div>

      <div>
        <div style="font-size:11px;font-weight:700;color:var(--tac);margin-bottom:.4rem">コンストラクタの中で起きること</div>
        <div class="code-sample">class Dog extends Animal {
  constructor(name, hp, hunger, toy) {
    this.name = name;
    this.hp = hp;
    this.hunger = hunger;
    this.favoriteToy = toy;
    Dog.count++;
  }
}

const dog = new Dog(${constructorArgsText(c)});</div>
      </div>
    </div>

    ${g0st.ctorMade?`
      <div id="constructor-result" style="background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:1rem;margin-bottom:1rem">
        <div style="font-size:13px;font-weight:700;color:var(--tp);margin-bottom:.65rem">生成結果：生まれた瞬間から値が入っている</div>
        <div style="display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:10px">
          ${g0card(`🐕 Dogインスタンス：${name}`,[
            `<span style="color:var(--tok)">名前 = ${name}</span>`,
            `<span style="color:var(--tok)">体力 = ${hp}</span>`,
            `<span style="color:var(--tok)">空腹度 = ${hunger}</span>`,
            `<span style="color:var(--tok)">好きな遊び = ${toy}</span>`
          ],'var(--bok)')}
          ${g0card('Dog クラス全体',[`<span style="color:var(--twn)">static 生成数 = ${count}</span>`,`<span style="color:var(--twn)">static 種族名 = 犬</span>`],'var(--bwn)')}
        </div>
        <div class="fb ok show" style="display:block;margin-top:1rem;margin-bottom:0">✓ 入力した値が、<code>constructor</code> の引数として渡され、インスタンスのフィールドに初期値としてセットされました。<br>一方で <code>Dog.count</code> は個体ごとではなく、Dogクラス全体で共有される <strong>static</strong> な値です。</div>
      </div>`:`
      <div id="constructor-result" class="info-box">まだ <code>new Dog()</code> していません。左の入力欄に初期値を入れて、犬インスタンスを生成してみましょう。</div>`}

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1rem">
      <div>${g0card('インスタンスごとの値',[`名前 = ${g0st.ctorMade?name:'ポチ'}`,`体力 = ${g0st.ctorMade?hp:80}`,`空腹度 = ${g0st.ctorMade?hunger:50}`],'var(--bok)')}</div>
      <div>${g0card('クラス全体で1つの値',['<span style="color:var(--twn)">static 種族名 = 犬</span>',`<span style="color:var(--twn)">static 生成数 = ${count}</span>`],'var(--bwn)')}</div>
    </div>
    <div class="lesson-point"><strong>判断軸：</strong>名前・体力・空腹度は個体ごとに違うのでインスタンスフィールド。生成数・共通設定はクラス全体で1つあればよいので static。</div>
    <button class="btn btn-p" onclick="g0do('next')">最後：動物園システムを完成させる →</button>`;
  }

  // ── フェーズ7：ボス戦 ──
  if(phase===7){
    const dogSound=soundOf('dog','ワン！');
    const catSound=soundOf('cat','ニャー');
    const birdSound=soundOf('bird','チュン');
    return `
    <div class="ch-title">${CHAPTERS[0].name} — STEP 8 / 8</div>
    <div class="ch-heading">ボス戦：動物園システムを完成させろ</div>
    <p class="game-intro">ここまでの道具を、1つのシステムとして動かします。個別用語ではなく、全部がつながっていることを確認しよう。</p>
    ${phaseDialogue(7)}
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem">
      ${g0card('① 抽象クラス + 継承',['Animal','犬 / 猫 / 鳥'],'var(--tpr)')}
      ${g0card('② オーバーライド + 多態性',['全員に 鳴け！',`${dogSound} / ${catSound} / ${birdSound}`],'var(--bok)')}
      ${g0card('③ インターフェース',['鳥 implements Flyable','犬 implements Movable'],'var(--bac)')}
      ${g0card('④ カプセル化',['空腹度は private','食べる()でだけ変更'],'var(--bng)')}
      ${g0card('⑤ コンストラクタ',['new Dog("ポチ")','初期値をセット'],'var(--bok)')}
      ${g0card('⑥ static',['動物総数','クラス全体で共有'],'var(--bwn)')}
    </div>
    <div style="background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:1rem;margin-bottom:1rem">
      <div style="font-size:13px;font-weight:700;margin-bottom:.65rem;color:var(--tp)">🎬 実行結果</div>
      <div class="code-sample">朝になりました
🐕 ポチ：${dogSound}
🐱 ミケ：${catSound}
🐦 ピヨ：${birdSound}

犬だけ探す → instanceof Dog → お手！
悪いプログラム：ポチ.空腹度 = -999 → privateなのでブロック
new Dog("コロ") → 動物総数 +1</div>
    </div>
    <div class="summary-grid">
      ${[
        ['継承','共通部分を親にまとめる'],['抽象クラス','未完成の親で実装を強制'],['ポリモーフィズム','親型で呼んでも実体の処理が動く'],['型キャスト','まとめた後で犬専用機能を使う'],['インターフェース','種類を超えた能力の型を作る'],['カプセル化','直接改ざんを防ぐ'],['コンストラクタ','生まれた瞬間の初期設定'],['static','全体で1つの値を共有']
      ].map(([a,b])=>`<div class="sum-card"><strong>✓ ${a}</strong><p>${b}</p></div>`).join('')}
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap"><button class="btn btn-p" onclick="finishGame(25)">序章クリア！ 完了へ →</button><button class="btn" onclick="retryG0()">最初から ↩</button></div>`;
  }

}


function renderComplete(){
  return `
    <div class="complete">
      <h2>🎉 OOPクエスト 序章クリア！</h2>
      <p style="color:var(--ts);line-height:1.8;font-size:14px">動物園システムを通して、オブジェクト指向の基本を体験しました。</p>
      <div class="big-score">${G.score}</div>
      <div style="color:var(--tm);font-size:12px;margin-bottom:1rem">SCORE</div>
      <div class="summary-grid">
        <div class="sum-card"><strong>継承</strong><p>共通処理を親クラスにまとめる。</p></div>
        <div class="sum-card"><strong>抽象クラス</strong><p>子クラスに実装を約束させる。</p></div>
        <div class="sum-card"><strong>ポリモーフィズム</strong><p>親型で同じ命令を出し、実体ごとに違う処理を走らせる。</p></div>
        <div class="sum-card"><strong>型キャスト</strong><p>必要な時だけ具体的な型として扱い直す。</p></div>
        <div class="sum-card"><strong>インターフェース</strong><p>種類を超えて「できること」の共通型を作る。</p></div>
        <div class="sum-card"><strong>カプセル化</strong><p>データを隠し、メソッドを窓口にする。</p></div>
        <div class="sum-card"><strong>コンストラクタ</strong><p>誕生時に正しい初期状態を作る。</p></div>
        <div class="sum-card"><strong>static</strong><p>全体で1つだけ共有する値を持つ。</p></div>
      </div>
      <button class="btn btn-p" onclick="G.phase='story';G.line=0;G.score=0;retryG0();render();">もう一度プレイ</button>
    </div>`;
}

render();
</script>
</body>
</html>
