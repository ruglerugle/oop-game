<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新人エンジニアの銀行</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --s0:#f1efe8;--s1:#f8f7f4;--s2:#fff;
  --tp:#1a1a18;--ts:#5f5e5a;--tm:#888780;
  --bd:rgba(0,0,0,.13);--bds:rgba(0,0,0,.22);
  --ok:#eaf3de;--tok:#3b6d11;--bok:#97c459;
  --ng:#fcebeb;--tng:#a32d2d;--bng:#f09595;
  --ac:#e6f1fb;--tac:#185fa5;--bac:#85b7eb;--fac:#378add;
  --pr:#eeedfe;--tpr:#534ab7;
  --wn:#faeeda;--twn:#854f0b;--bwn:#ef9f27;
  --r:8px;--f:system-ui,-apple-system,sans-serif;--m:ui-monospace,'Cascadia Code',monospace;
}
@media(prefers-color-scheme:dark){:root{
  --s0:#1c1c1a;--s1:#252523;--s2:#2e2e2b;
  --tp:#f0ede6;--ts:#a8a69f;--tm:#6e6c67;
  --bd:rgba(255,255,255,.11);--bds:rgba(255,255,255,.2);
  --ok:#173404;--tok:#c0dd97;--bok:#3b6d11;
  --ng:#501313;--tng:#f09595;--bng:#a32d2d;
  --ac:#042c53;--tac:#85b7eb;--bac:#185fa5;
  --pr:#26215c;--tpr:#afa9ec;
  --wn:#412402;--twn:#fac775;--bwn:#ba7517;
}}
body{font-family:var(--f);background:var(--s0);color:var(--tp);min-height:100vh;display:flex;justify-content:center;padding:1.5rem 1rem}
.wrap{width:100%;max-width:700px}

/* ── ナビ ── */
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;gap:8px;flex-wrap:wrap}
.chapter-nav{display:flex;gap:6px;flex-wrap:wrap}
.ch-dot{padding:4px 12px;border-radius:99px;font-size:12px;border:1px solid var(--bd);background:var(--s1);color:var(--tm);transition:all .2s}
.ch-dot.done{background:var(--ok);color:var(--tok);border-color:var(--bok)}
.ch-dot.active{background:var(--fac);color:#fff;border-color:var(--fac)}
.top-btns{display:flex;gap:6px}
.progress{height:4px;background:var(--bd);border-radius:2px;margin-bottom:1.25rem}
.progress-fill{height:100%;background:var(--fac);border-radius:2px;transition:width .4s}

/* ── 用語ツールチップ ── */
.gloss-term{color:var(--fac);text-decoration:underline;text-decoration-style:dotted;cursor:help;text-underline-offset:3px}
.gloss-term:hover{background:var(--ac);border-radius:2px}
#gloss-popup{display:none;position:fixed;z-index:200;background:var(--s2);border:1px solid var(--bds);border-radius:12px;padding:1rem 1.25rem 1rem 1rem;box-shadow:0 6px 24px rgba(0,0,0,.18);max-width:280px;width:calc(100vw - 32px)}
#gloss-popup strong{display:block;margin-bottom:.5rem;font-size:14px;color:var(--tp)}
#gloss-popup p{color:var(--ts);line-height:1.65;font-size:13px}
#gloss-close{position:absolute;top:8px;right:8px;background:none;border:none;cursor:pointer;color:var(--tm);font-size:18px;line-height:1;padding:2px 6px;font-family:var(--f)}

/* ── ストーリー ── */
.story-panel{background:var(--s2);border:1px solid var(--bd);border-radius:16px;padding:1.25rem;margin-bottom:1rem}
.npc{display:flex;align-items:flex-start;gap:10px;margin-bottom:1rem}
.npc-avatar{font-size:32px;flex-shrink:0;line-height:1}
.npc-name{font-size:11px;font-weight:500;color:var(--tm);margin-bottom:4px}
.bubble{background:var(--s1);border:1px solid var(--bd);border-radius:0 12px 12px 12px;padding:.75rem 1rem;font-size:14px;line-height:1.8;color:var(--tp)}
.story-actions{display:flex;justify-content:flex-end}

/* ── 汎用ボタン ── */
.btn{border:1px solid var(--bds);background:transparent;border-radius:var(--r);padding:.6rem 1.25rem;font-size:14px;cursor:pointer;color:var(--tp);font-family:var(--f);transition:background .15s;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.btn:hover{background:var(--s1)}
.btn-p{background:var(--fac);color:#fff;border-color:var(--fac)}
.btn-p:hover{opacity:.9;background:var(--fac)}
.btn:disabled{opacity:.4;cursor:default;pointer-events:none}
.btn-sm{padding:.4rem .75rem;font-size:12px}

.ch-title{font-size:11px;font-weight:500;color:var(--tm);letter-spacing:.08em;margin-bottom:4px}
.ch-heading{font-size:20px;font-weight:500;margin-bottom:1rem;color:var(--tp)}
.game-intro{font-size:14px;color:var(--ts);margin-bottom:1rem;line-height:1.6}

/* ── UML クラスボックス ── */
.uml-class{border:2px solid var(--ts);background:var(--s2)}
.uml-head{background:var(--s0);border-bottom:1.5px solid var(--ts);padding:8px 14px;font-weight:500;text-align:center;font-size:14px}
.uml-sec{border-bottom:1.5px solid var(--ts);padding:4px 0}
.uml-sec:last-child{border-bottom:none}
.m-row{display:flex;align-items:center;gap:8px;padding:8px 12px;font-family:var(--m);font-size:12px;border-left:3px solid transparent}
.m-name{flex:1;word-break:break-all}
.m-mod-btn{display:flex;gap:4px;flex-shrink:0}
.mod-opt{padding:4px 8px;border-radius:4px;font-size:11px;font-weight:500;cursor:pointer;border:1.5px solid transparent;opacity:.4;transition:all .15s;touch-action:manipulation}
.mod-opt:hover{opacity:.7}
.mod-opt.sel{opacity:1;border-color:currentColor}
.mod-pub{color:var(--tok);background:var(--ok)}
.mod-pri{color:var(--tng);background:var(--ng)}
.mod-pro{color:var(--tpr);background:var(--pr)}

/* ── 継承ツリー ── */
.tree-wrap{background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:1.25rem 1rem;margin-bottom:1rem;overflow-x:auto;-webkit-overflow-scrolling:touch}
.cards-area{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1rem}
.class-card{padding:6px 12px;border:2px solid var(--bds);border-radius:var(--r);background:var(--s2);cursor:pointer;font-size:12px;font-weight:500;transition:all .15s;user-select:none;touch-action:manipulation}
.class-card:hover,.class-card.selected{border-color:var(--fac);background:var(--ac);color:var(--tac)}
.class-card.placed{opacity:.3;cursor:default;pointer-events:none}

/* ── 合成/集約 ── */
.worlds{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1rem}
.world-box{background:var(--s2);border:1px solid var(--bd);border-radius:12px;padding:1rem;text-align:center}
.world-title{font-size:12px;font-weight:500;margin-bottom:.75rem;color:var(--ts)}
.obj-block{padding:8px 12px;border:2px solid var(--ts);background:var(--s2);font-size:12px;font-weight:500;border-radius:4px;transition:opacity .5s,transform .5s;display:inline-block}
.obj-block.dead{opacity:0;transform:scale(.6)}
.compose-line{width:2px;height:16px;margin:0 auto}
.compose-line.solid{background:var(--tp)}
.compose-line.dashed{background:repeating-linear-gradient(to bottom,var(--ts) 0,var(--ts) 4px,transparent 4px,transparent 8px)}
.diamond{width:11px;height:11px;transform:rotate(45deg);margin:3px auto}
.diamond.filled{background:var(--tp)}
.diamond.empty-d{border:2px solid var(--tp)}
.rel-label{font-size:11px;color:var(--tm);margin:.5rem 0;line-height:1.4}
.world-quiz{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:.875rem 1rem;margin-bottom:.75rem}
.wq-q{font-size:13px;margin-bottom:.75rem;line-height:1.6}
.wq-opts{display:flex;gap:8px;flex-wrap:wrap}
.wq-opt{padding:8px 16px;border:1px solid var(--bds);border-radius:var(--r);font-size:13px;cursor:pointer;background:var(--s2);transition:all .15s;touch-action:manipulation}
.wq-opt:hover{background:var(--s1)}
.wq-opt.ok{background:var(--ok);border-color:var(--bok);color:var(--tok)}
.wq-opt.ng{background:var(--ng);border-color:var(--bng);color:var(--tng)}

/* ── ポリモーフィズム ── */
.poly-area{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1rem}
.poly-card{background:var(--s2);border:2px solid var(--bd);border-radius:12px;padding:.75rem .5rem;text-align:center;transition:border-color .3s,background .3s,transform .3s}
.poly-card.active{border-color:var(--fac);background:var(--ac);transform:translateY(-4px)}
.poly-card.done{border-color:var(--bok);background:var(--ok)}
.poly-icon{font-size:22px;margin-bottom:.25rem}
.poly-class{font-size:11px;font-weight:500;margin-bottom:.3rem;color:var(--tp)}
.poly-method{font-size:9px;font-family:var(--m);color:var(--tm);background:var(--s1);border-radius:4px;padding:2px 5px;margin-bottom:.4rem;display:inline-block}
.poly-impl{font-size:9px;font-family:var(--m);color:var(--tac);background:var(--ac);border-radius:4px;padding:2px 5px;margin-bottom:3px;opacity:0;transition:opacity .4s}
.poly-impl.show{opacity:1}
.poly-result{font-size:11px;font-weight:500;color:var(--tok);opacity:0;transition:opacity .4s}
.poly-result.show{opacity:1}
.poly-dispatch{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:.75rem 1rem;font-family:var(--m);font-size:12px;line-height:2;margin-bottom:1rem}

/* ── 抽象クラス ── */
.abs-badge{display:inline-block;font-size:10px;padding:1px 6px;border-radius:4px;margin-left:6px;font-style:italic;background:var(--pr);color:var(--tpr)}

/* ── static ── */
.accounts{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem}
.acc-card{background:var(--s2);border:1px solid var(--bd);border-radius:12px;padding:.75rem .5rem;text-align:center}
.acc-icon{font-size:22px;margin-bottom:.3rem}
.acc-name{font-size:10px;font-weight:500;margin-bottom:.5rem}
.acc-field{font-size:10px;font-family:var(--m);padding:3px 6px;border-radius:4px;margin-bottom:3px;display:flex;justify-content:space-between;gap:4px;align-items:center}
.acc-field.static-f{background:var(--wn);color:var(--twn)}
.acc-field.inst-f{background:var(--s1);color:var(--ts)}
.acc-val{font-weight:500;font-size:10px;text-align:right;flex-shrink:0}
.ctrl-box{border-radius:var(--r);padding:.875rem 1rem;margin-bottom:.75rem;font-size:14px}
.ctrl-box.static-ctrl{background:var(--wn);border:1px solid var(--bwn);display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.ctrl-box.inst-ctrl{background:var(--s1);border:1px solid var(--bd)}
.ctrl-box span.label{font-weight:500}
.static-ctrl span.label{color:var(--twn)}
.inst-ctrl span.label{color:var(--ts);font-size:13px}
.inst-btns{display:flex;gap:6px;flex-wrap:wrap;margin-top:.5rem}
.inst-btn{padding:8px 12px;border:1px solid var(--bds);border-radius:var(--r);font-size:12px;cursor:pointer;background:var(--s2);font-family:var(--f);touch-action:manipulation}
.inst-btn:hover{background:var(--s1)}

.fb{border-radius:var(--r);padding:.875rem 1rem;font-size:14px;line-height:1.6;margin-bottom:1rem;display:none}
.fb.show{display:block}
.fb.ok{background:var(--ok);color:var(--tok);border:1px solid var(--bok)}
.fb.ng{background:var(--ng);color:var(--tng);border:1px solid var(--bng)}
.info-box{background:var(--ac);border:1px solid var(--bac);border-radius:var(--r);padding:.75rem 1rem;font-size:13px;color:var(--tac);margin-bottom:1rem;line-height:1.8}

.complete{text-align:center;padding:2rem 0}
.complete h2{font-size:22px;font-weight:500;margin-bottom:.5rem}
.big-score{font-size:48px;font-weight:500;color:var(--fac);margin:.5rem 0}
.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin:1.25rem 0;text-align:left}
.sum-card{background:var(--s2);border:1px solid var(--bd);border-radius:12px;padding:.75rem 1rem}
.sum-card strong{display:block;font-size:13px;margin-bottom:4px;color:var(--tp)}
.sum-card p{color:var(--ts);line-height:1.6;font-size:12px}

@media(max-width:500px){
  .worlds{grid-template-columns:1fr}
  .poly-area{grid-template-columns:1fr}
  .m-name{font-size:11px}
  .ctrl-box.static-ctrl{flex-direction:column;align-items:flex-start}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="top-bar">
    <div class="chapter-nav" id="ch-nav"></div>
    <div class="top-btns">
      <button class="btn btn-sm" id="back-btn" onclick="goBack()">← 戻る</button>
    </div>
  </div>
  <div class="progress"><div class="progress-fill" id="prog" style="width:0%"></div></div>
  <div id="screen"></div>
</div>
<div id="gloss-popup">
  <button id="gloss-close" onclick="closeGloss()">×</button>
  <strong id="gloss-term"></strong>
  <p id="gloss-def"></p>
</div>
<script>
const G={chapter:0,phase:'story',line:0,score:0};
const history=[];

const CHAPTERS=[
  {name:'序章',sub:'OOPの基礎を知れ'},
  {name:'第1章',sub:'口座情報を守れ'},
  {name:'第2章',sub:'金融商品の分類'},
  {name:'第3章',sub:'銀行と支店と顧客'},
  {name:'第4章',sub:'金利改定の謎'},
  {name:'第5章',sub:'同じ命令、違う動き'},
  {name:'第6章',sub:'設計の契約書'},
  {name:'第7章',sub:'口座開設の設計図'},
  {name:'第8章',sub:'型の正体を見抜け'},
  {name:'第9章',sub:'障害に備えるシステム'},
  {name:'第10章',sub:'クラスの依存関係'},
  {name:'第11章',sub:'インターフェースの実現'},
  {name:'実践編',sub:'設計制約パズル'},
];

const GLOSSARY=[
  {term:'クラス',def:'オブジェクトの設計図。BankAccount クラスのように、フィールドとメソッドをまとめたもの。'},
  {term:'オブジェクト',def:'クラスから作られた実体。インスタンスとほぼ同義で使われる。「田中さんの口座オブジェクト」のように、データと処理をひとまとめにしたもの。'},
  {term:'インスタンス',def:'クラスから作られた実体。new BankAccount() で作る一つひとつが「インスタンス」。田中さんの口座と鈴木さんの口座はそれぞれ別のインスタンス。'},
  {term:'コンストラクタ',def:'new でインスタンスを作るときに自動的に呼ばれる特別なメソッド。口座番号や名義人など初期値をセットするのに使う。クラス名と同じ名前で定義する。'},
  {term:'バリデーション',def:'値や状態が正しい条件を満たしているか確認する処理。「残高が0以上か」「取引額が上限以内か」などのチェック。認証（誰か確認）や認可（権限確認）とは別の概念。'},
  {term:'フィールド',def:'クラスが持つ変数（データ）。balance や pin など、状態を保持する場所。'},
  {term:'メソッド',def:'クラスが持つ関数（処理）。getBalance() や validatePin() など、動作を定義したもの。'},
  {term:'メンバー',def:'クラスが持つフィールドとメソッドの総称。クラスの「構成要素」全体を指す言葉。'},
  {term:'アクセス修飾子',def:'public / private / protected のこと。クラスのメンバーに「誰がアクセスできるか」を指定する。カプセル化の基本機能。'},
  {term:'public',def:'どこからでもアクセスできる修飾子（+）。外部に公開するメソッドやデータに使う。'},
  {term:'private',def:'クラス自身のコードからのみアクセスできる修飾子（−）。残高や暗証番号など外部に見せたくないデータに使う。'},
  {term:'protected',def:'自クラスと子クラスからのみアクセスできる修飾子（#）。継承して使いたいが外部には隠したい場合に使う。'},
  {term:'継承',def:'親クラスの性質を子クラスが引き継ぐ仕組み。is-a 関係。SavingsAccount は Account の一種なので継承できる。'},
  {term:'合成',def:'強い has-a 関係（◆）。所有者が消えると所有されるものも消える。銀行が倒産すると支店も消滅する例。'},
  {term:'集約',def:'弱い has-a 関係（◇）。所有されるものは独立して存在できる。銀行が倒産しても顧客は別の銀行に移れる例。'},
  {term:'static',def:'インスタンスではなくクラス自体に属するフィールドやメソッド。全インスタンスで1つの値を共有する。金利はどの口座でも同じなので static が適切。'},
  {term:'is-a',def:'「〇〇は△△の一種」という関係。継承を使う目安。SavingsAccount is a Account（普通預金は口座の一種）。'},
  {term:'has-a',def:'「〇〇は△△を持つ」という関係。合成（強◆）または集約（弱◇）を使う。Bank has a Branch（銀行は支店を持つ）。'},
  {term:'カプセル化',def:'データと処理をクラスにまとめ、外部から隠す仕組み。private で内部を隠し、public メソッドだけを窓口として公開する。'},
  {term:'ポリモーフィズム',def:'同じメソッド名の呼び出しが、実際のオブジェクトの型に応じて異なる実装を実行する仕組み。Account[] に SavingsAccount と LoanAccount を混ぜて一括処理できる。'},
  {term:'オーバーライド',def:'親クラスのメソッドを子クラスで再定義すること。SavingsAccount が Account の calculateInterest() を上書きして独自の計算式を持つ例。'},
  {term:'抽象クラス',def:'インスタンス化できないクラス。abstract メソッドを持ち、サブクラスに実装を強制する。Account を abstract にすれば「必ず calculateInterest() を実装せよ」と契約できる。'},
  {term:'インターフェース',def:'メソッドのシグネチャだけを定義した契約書。抽象クラスと違い多重実装できる。Transferable インターフェースを複数の口座クラスに実装させる例。'},
  {term:'オーバーロード',def:'同じクラス内で同名メソッドを引数の型や数を変えて複数定義すること。transfer(int) と transfer(int, String) のように使う。オーバーライドとは別の概念。'},
  {term:'型キャスト',def:'変数の型を別の型に変換する操作。親クラス型を子クラス型に変換するのはダウンキャスト。実際のオブジェクトと違う型にキャストすると ClassCastException が発生する。'},
  {term:'ダウンキャスト',def:'親クラス型の変数を子クラス型に変換すること。SavingsAccount s = (SavingsAccount) a; のように書く。instanceof で型を確認してから行うのが安全。'},
  {term:'instanceof',def:'オブジェクトが特定のクラスのインスタンスかどうかを確認する演算子。if (a instanceof SavingsAccount) のように使う。ダウンキャスト前の安全確認に役立つ。'},
  {term:'例外処理',def:'実行時エラーを安全に捕まえて対処する仕組み。throw で例外を投げ、try で主処理を囲み、catch でエラーを受け取り、finally で後処理を実行する。'},
  {term:'throw',def:'例外を意図的に発生させるキーワード。throw new InsufficientFundsException() のように書く。条件チェックで異常を検知したときに使う。'},
  {term:'依存',def:'あるクラスが別のクラスを「一時的に使う」関係。メソッドの引数やローカル変数として使うだけで、フィールドには持たない。最も弱い結合。UML では点線矢印 →。'},
  {term:'実現',def:'クラスがインターフェースを implements すること。「このクラスはこの契約を果たす」という関係。メソッドを全て正確なシグネチャで実装する必要がある。UML では点線＋白抜き三角 ▷。'},
];

const stories={
  0:[
    {npc:'🌍 ナレーター',text:'あなたは創造主。この世界では、すべての存在を「クラス」という設計図から作ることができます。'},
    {npc:'🌍 ナレーター',text:'最初は犬・猫・鳥を作るだけ。でもコードを書けば書くほど、同じ処理が何度も現れてきます。'},
    {npc:'🌍 ナレーター',text:'そのたびにコードを賢く整理する方法を発見して、設計力を磨いていきましょう。継承・抽象クラス・インターフェース——全部「楽をするための発明」です。'},
  ],
  '0e':[

// ─── GLOSSARY TOOLTIP ────────────────────────
function showGloss(el,term){
  const g=GLOSSARY.find(x=>x.term===term);
  if(!g)return;
  document.getElementById('gloss-term').textContent=g.term;
  document.getElementById('gloss-def').textContent=g.def;
  const pop=document.getElementById('gloss-popup');
  pop.style.display='block';
  const r=el.getBoundingClientRect();
  const pw=Math.min(280,window.innerWidth-32);
  let left=r.left;
  if(left+pw>window.innerWidth-8)left=window.innerWidth-pw-8;
  if(left<8)left=8;
  let top=r.bottom+6;
  pop.style.left=left+'px';
  pop.style.top=top+'px';
  pop.style.width=pw+'px';
}
function closeGloss(){document.getElementById('gloss-popup').style.display='none';}
document.addEventListener('click',e=>{
  if(!e.target.closest('#gloss-popup')&&!e.target.classList.contains('gloss-term'))closeGloss();
});
// テキスト内の用語をクリッカブルスパンに変換
// プレースホルダー方式: 置換済みテキスト内の部分一致を防ぐ
function glossify(html){
  const terms=['カプセル化','ポリモーフィズム','オーバーライド','抽象クラス','インターフェース','オーバーロード','アクセス修飾子','コンストラクタ','バリデーション','ダウンキャスト','型キャスト','instanceof','例外処理','throw','依存','実現','オブジェクト','インスタンス','フィールド','メンバー','メソッド','クラス','継承','合成','集約','static','public','private','protected','is-a','has-a'];
  const ph=[];
  const parts=html.split(/(<[^>]+>)/);
  const withPh=parts.map((p,i)=>{
    if(i%2===1)return p;
    return terms.reduce((s,t)=>{
      if(!s.includes(t))return s;
      const idx=ph.length;
      ph.push(`<span class="gloss-term" onclick="showGloss(this,'${t}')">${t}</span>`);
      return s.split(t).join(`\x00${idx}\x00`);
    },p);
  }).join('');
  return withPh.replace(/\x00(\d+)\x00/g,(_,i)=>ph[+i]);
}

// ─── NAV & RENDER ────────────────────────────
function jumpTo(ch){
  saveHistory();
  G.chapter=ch;G.phase='story';G.line=0;
  render();
}
function updateNav(){
  document.getElementById('ch-nav').innerHTML=CHAPTERS.map((c,i)=>{
    const cl=i<G.chapter?'done':i===G.chapter?'active':'';
    return `<div class="ch-dot ${cl}" onclick="jumpTo(${i})" title="${c.sub}" style="cursor:pointer">${c.name}</div>`;
  }).join('');
  const total=CHAPTERS.length*2;
  const done=G.chapter*2+(G.phase==='epilogue'?1.5:G.phase==='game'?1:0);
  document.getElementById('prog').style.width=Math.min(100,done/total*100)+'%';
  const backBtn=document.getElementById('back-btn');
  if(backBtn)backBtn.disabled=history.length===0;
}
function storyHTML(lines,idx,onNext,isEpilogue=false){
  const l=lines[idx],last=idx>=lines.length-1;
  return `
    <div class="ch-title">${CHAPTERS[G.chapter].name}${isEpilogue?' — まとめ':''}</div>
    <div class="ch-heading">${CHAPTERS[G.chapter].sub}</div>
    <div class="story-panel">
      <div class="npc">
        <div class="npc-avatar">${l.npc.split(' ')[0]}</div>
        <div style="flex:1">
          <div class="npc-name">${l.npc.split(' ').slice(1).join(' ')}</div>
          <div class="bubble">${glossify(l.text)}</div>
        </div>
      </div>
      <div class="story-actions">
        <button class="btn btn-p" onclick="${onNext}">${last?(isEpilogue?(G.chapter<CHAPTERS.length-1?'次の章へ →':'完了 →'):'ゲームスタート →'):'次へ →'}</button>

    </div>`;
}
function render(){
  updateNav();
  const scr=document.getElementById('screen');
  if(G.phase==='story') scr.innerHTML=storyHTML(stories[G.chapter],G.line,'advStory()');
  else if(G.phase==='game') scr.innerHTML=[renderG0,renderG1,renderG2,renderG3,renderG4,renderG5,renderG6,renderG7,renderG8,renderG9,renderG10,renderG11,renderGP][G.chapter]();
  else if(G.phase==='epilogue') scr.innerHTML=storyHTML(stories[G.chapter+'e'],G.line,'advEpilogue()',true);
  else scr.innerHTML=renderComplete();
}
function advStory(){
  saveHistory();
  const lines=stories[G.chapter];
  if(G.line<lines.length-1){G.line++;render();}
  else{G.phase='game';G.line=0;render();}
}
function advEpilogue(){
  saveHistory();
  const lines=stories[G.chapter+'e'];
  if(G.line<lines.length-1){G.line++;render();}
  else{G.chapter++;G.line=0;G.phase=G.chapter>=CHAPTERS.length?'complete':'story';render();}
}
function finishGame(pts){saveHistory();G.score+=pts;G.phase='epilogue';G.line=0;render();}

let g0st={phase:0,sounds:{},moveTried:false,movableOk:false};

function g0do(act,p){
  if(act==='next') g0st.phase++;
  else if(act==='sound') g0st.sounds[p.who]=p.s;
  else if(act==='moveTry') g0st.moveTried=true;
  else if(act==='movable'){g0st.movableOk=true;}
  document.getElementById('screen').innerHTML=renderG0();
}
function retryG0(){g0st={phase:0,sounds:{},moveTried:false,movableOk:false};document.getElementById('screen').innerHTML=renderG0();}

function g1check(){
  const correct=g1sel.filter((s,i)=>s===g1m[i].correct).length;
  const ok=correct===g1m.length,pts=ok?25:Math.max(5,correct*4);
  const rows=g1m.map((m,i)=>{
    const acc=g1sel[i]==='pub',sec=m.correct==='pri';
    const icon=acc?(sec?'🚨 漏洩！':'✅ OK'):'🔒 ブロック';
    return `<div style="display:flex;font-family:var(--m);font-size:12px;padding:4px 0;gap:8px"><span style="flex:1">${m.name}</span><span style="color:${acc&&sec?'var(--tng)':'var(--tok)'}">${icon}</span></div>`;
  }).join('');
  const result=g1m.map((m,i)=>g1sel[i]!==m.correct?`<span style="color:var(--tng)">✗ ${m.name}（正解:${m.correct}）</span>`:`<span style="color:var(--tok)">✓ ${m.name}</span>`).join('<br>');
  const fb=document.getElementById('g1fb');
  fb.className='fb '+(ok?'ok':'ng')+' show';
  fb.innerHTML=`<div style="background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:.75rem;margin-bottom:.75rem;font-size:13px">🔍 外部アクセステスト<br>${rows}</div>${ok?'✓ 完璧！':'✗ 不正解あり。'} ${correct}/${g1m.length} 正解<br>${result}<br><br><div style="display:flex;gap:8px;flex-wrap:wrap"><button class="btn btn-p" onclick="finishGame(${pts})">次へ →</button><button class="btn" onclick="retryG1()">もう一度 ↩</button></div>`;
  document.querySelector('[onclick="g1check()"]').disabled=true;
}

// ─── GAME 2: 継承ツリー（SVG） ──────────────────
const g2correct={dep:'DepositAccount',loan:'LoanAccount',sav:'SavingsAccount',td:'TimeDeposit',ml:'MortgageLoan',cl:'CarLoan'};
const g2cards=Object.values(g2correct);
const g2jp={'Account':'口座','DepositAccount':'預金口座','LoanAccount':'ローン口座','SavingsAccount':'普通預金','TimeDeposit':'定期預金','MortgageLoan':'住宅ローン','CarLoan':'カーローン'};
let g2placed={},g2sel=null,g2done=false;

function g2NodeSVG(cx,y,w,h,label,isFixed,slotId){
  const isEmpty=!label&&!isFixed;
  const hl=isEmpty&&g2sel!==null;
  const stroke=isEmpty?(hl?'var(--fac)':'var(--tm)'):'var(--ts)';
  const bg=hl?'var(--ac)':'var(--s2)';
  const tc=isEmpty?(hl?'var(--tac)':'var(--tm)'):'var(--tp)';
  const tc2=isEmpty?(hl?'var(--tac)':'var(--tm)'):'var(--ts)';
  const dash=isEmpty?'stroke-dasharray="6 3"':'';
  const click=slotId?`onclick="g2place('${slotId}')" style="cursor:pointer"`:'';
  const x=cx-w/2;
  const jp=label?g2jp[label]:'';
  const mainY=jp?y+h*0.38:y+h/2+4;
  const subY=y+h*0.72;
  return `<g ${click}>
    <rect x="${x}" y="${y}" width="${w}" height="${h}" rx="3"
      style="fill:${bg};stroke:${stroke};stroke-width:2" ${dash}/>
    <text x="${cx}" y="${mainY}" text-anchor="middle"
      style="font-size:11px;font-weight:500;fill:${tc}" pointer-events="none">${label||'?'}</text>
    ${jp?`<text x="${cx}" y="${subY}" text-anchor="middle" style="font-size:9px;fill:${tc2}" pointer-events="none">${jp}</text>`:''}
  </g>`;
}

function g2Arrow(childCenters, childTopY, parentCx, parentBottomY, barY){
  const tri_h=12, tri_w=8;
  const triBot=parentBottomY+tri_h;
  const minCx=Math.min(...childCenters), maxCx=Math.max(...childCenters);
  let s=childCenters.map(cx=>`<line x1="${cx}" y1="${childTopY}" x2="${cx}" y2="${barY}" style="stroke:var(--ts);stroke-width:1.5"/>`).join('');
  s+=`<line x1="${minCx}" y1="${barY}" x2="${maxCx}" y2="${barY}" style="stroke:var(--ts);stroke-width:1.5"/>`;
  s+=`<line x1="${parentCx}" y1="${barY}" x2="${parentCx}" y2="${triBot}" style="stroke:var(--ts);stroke-width:1.5"/>`;
  s+=`<polygon points="${parentCx},${parentBottomY} ${parentCx-tri_w},${triBot} ${parentCx+tri_w},${triBot}" style="fill:var(--s2);stroke:var(--ts);stroke-width:1.5;stroke-linejoin:round"/>`;
  return s;
}

function renderG2(){
  // NODE_H=46 で2行表示
  const NODE_H=46;
  const N={
    account: {cx:300,y:10, w:96, label:'Account',      fixed:true},
    dep:     {cx:192,y:116,w:140,label:g2placed.dep||'',slot:'dep'},
    loan:    {cx:408,y:116,w:128,label:g2placed.loan||'',slot:'loan'},
    sav:     {cx:108,y:220,w:98, label:g2placed.sav||'',slot:'sav'},
    td:      {cx:228,y:220,w:98, label:g2placed.td||'', slot:'td'},
    ml:      {cx:360,y:220,w:98, label:g2placed.ml||'', slot:'ml'},
    cl:      {cx:480,y:220,w:98, label:g2placed.cl||'', slot:'cl'},
  };
  // barY = 親bottom と 子top の中間
  // Account bottom=56, Dep/Loan top=116 → bar=86
  // Dep/Loan bottom=162, Leaf top=220 → bar=191
  const arrTop =g2Arrow([N.dep.cx,N.loan.cx],N.dep.y, N.account.cx,N.account.y+NODE_H,86);
  const arrDep =g2Arrow([N.sav.cx,N.td.cx], N.sav.y, N.dep.cx,   N.dep.y+NODE_H,   191);
  const arrLoan=g2Arrow([N.ml.cx,N.cl.cx],  N.ml.y,  N.loan.cx,  N.loan.y+NODE_H,  191);

  const nodes=Object.entries(N).map(([k,n])=>g2NodeSVG(n.cx,n.y,n.w,NODE_H,n.label,n.fixed,n.slot||null)).join('');

  const cards=g2cards.map(c=>{
    const pl=Object.values(g2placed).includes(c);
    return `<div class="class-card ${pl?'placed':''} ${g2sel===c?'selected':''}" onclick="g2sel_fn('${c}')" style="text-align:center;line-height:1.4">
      ${c}<br><span style="font-size:10px;font-weight:400;opacity:.65">${g2jp[c]}</span>
    </div>`;
  }).join('');

  const fb=g2done
    ?`<div class="fb ok show">✓ 完成！Account を頂点とした継承ツリーができました。</div><div style="display:flex;gap:8px;flex-wrap:wrap"><button class="btn btn-p" onclick="finishGame(25)">次へ →</button><button class="btn" onclick="retryG2()">もう一度 ↩</button></div>`
    :`<div class="fb" id="g2fb"></div><button class="btn btn-p" onclick="g2check()">確認する</button>`;

  return `
    <div class="ch-title">${CHAPTERS[2].name}</div>
    <div class="ch-heading">${CHAPTERS[2].sub}</div>
    <p class="game-intro">カードを選んでスロット（?）に配置してください。矢印は子クラス→親クラスの方向（UML標準）。</p>
    <div class="cards-area">${cards}</div>
    <div class="tree-wrap">
      <svg viewBox="0 0 590 276" style="width:100%;min-width:320px;display:block;color:var(--ts)">
        ${arrTop}${arrDep}${arrLoan}${nodes}
      </svg>
    </div>
    ${fb}`;
}
function g2sel_fn(c){g2sel=g2sel===c?null:c;document.getElementById('screen').innerHTML=renderG2();}
function g2place(id){
  if(!g2sel||g2done)return;
  g2placed[id]=g2sel;g2sel=null;
  document.getElementById('screen').innerHTML=renderG2();
}
function g2check(){
  const allFilled=['dep','loan','sav','td','ml','cl'].every(k=>g2placed[k]);
  if(!allFilled){
    const fb=document.getElementById('g2fb');
    fb.className='fb ng show';fb.textContent='✗ まだ空のスロットがあります';return;
  }
  const sort=arr=>[...arr].sort().join(',');
  // レベル1: dep+loan に DepositAccount と LoanAccount が揃っているか
  const lv1ok=sort([g2placed.dep,g2placed.loan])===sort(['DepositAccount','LoanAccount']);
  if(!lv1ok){
    const fb=document.getElementById('g2fb');
    fb.className='fb ng show';fb.textContent='✗ Account の直下には DepositAccount と LoanAccount が入ります';return;
  }
  // レベル2: 各親スロットの子スロットを確認（dep側→sav/td、loan側→ml/cl）
  const depIsLeft=g2placed.dep==='DepositAccount';
  const depChildren=depIsLeft?['sav','td']:['ml','cl'];
  const loanChildren=depIsLeft?['ml','cl']:['sav','td'];
  const lv2ok=
    sort(depChildren.map(s=>g2placed[s]))===sort(['SavingsAccount','TimeDeposit'])&&
    sort(loanChildren.map(s=>g2placed[s]))===sort(['MortgageLoan','CarLoan']);
  if(lv2ok){g2done=true;document.getElementById('screen').innerHTML=renderG2();return;}
  const fb=document.getElementById('g2fb');
  fb.className='fb ng show';fb.textContent='✗ 葉クラスの親が違います。is-a 関係を確認してください。';
}

function renderG5(){
  const cards=g5accs.map((a,i)=>{

    const bg=done?(a.color==='wn'?'var(--wn)':'var(--ok)'):active?(a.color==='wn'?'var(--wn)':'var(--ac)'):'var(--s2)';
    const bc=done?(a.color==='wn'?'var(--bwn)':'var(--bok)'):active?(a.color==='wn'?'var(--bwn)':'var(--fac)'):'var(--bd)';
    return `<div class="poly-card ${active?'active':''} ${done?'done':''}" style="background:${bg};border-color:${bc}">

    </div>`;
  }).join('');
  const completed=g5step>=g5accs.length;
  const quiz=completed?g5q.map((q,i)=>{
    const ans=g5quiz[i];
    return `<div class="world-quiz">
      <div class="wq-q">${q.q}</div>
      <div class="wq-opts">${q.opts.map((o,j)=>{
        const cl=ans!==null?(ans===j?(q.a===j?'ok':'ng'):''):'';
        return `<div class="wq-opt ${cl}" onclick="g5ans(${i},${j})">${o}</div>`;
      }).join('')}</div>

  }).join(''):'';

const g9frags=[
  {id:'throw',  code:'if (amount > balance)\n  throw new\n  InsufficientFundsException();', correct:'A'},
  {id:'op',     code:'balance -= amount;',                                                   correct:'B'},
  {id:'catch',  code:'notifyUser(\n  "残高不足です"\n);',                                    correct:'C'},
  {id:'finally',code:'logTransaction();',                                                     correct:'D'},
];
const g9slotMeta={
  A:{label:'A',desc:'try の前（バリデーション・throw）'},
  B:{label:'B',desc:'try { … } の中（主処理）'},
  C:{label:'C',desc:'catch (e) { … } の中（エラー処理）'},
  D:{label:'D',desc:'finally { … } の中（後処理）'},
};
let g9placed={},g9sel=null,g9done=false;

function renderG9(){
  const slotKeys=['A','B','C','D'];
  const slots=slotKeys.map(k=>{
    const fragId=g9placed[k];
    const frag=fragId?g9frags.find(f=>f.id===fragId):null;
    const hl=g9sel&&!frag;
    const ok=g9done&&frag&&g9frags.find(f=>f.id===fragId)?.correct===k;
    const ng=g9done&&frag&&!ok;
    return `<div onclick="g9place('${k}')" style="cursor:${g9sel&&!frag?'pointer':'default'};border:2px ${frag?'solid':'dashed'} ${ng?'var(--bng)':ok?'var(--bok)':hl?'var(--fac)':'var(--tm)'};border-radius:8px;padding:.5rem .75rem;background:${hl?'var(--ac)':'var(--s2)'};margin-bottom:6px">
      <div style="font-size:10px;color:var(--tm);margin-bottom:2px">[${k}] ${g9slotMeta[k].desc}</div>
      ${frag?`<pre style="font-size:10px;line-height:1.7;margin:0;color:${ng?'var(--tng)':ok?'var(--tok)':'var(--tp)'}">${frag.code}</pre>`:`<div style="font-size:12px;color:var(--tm);text-align:center;padding:4px 0">タップして配置</div>`}
    </div>`;
  }).join('');

  const cards=g9frags.map(f=>{
    const placed=Object.values(g9placed).includes(f.id);
    return `<div class="class-card ${placed?'placed':''} ${g9sel===f.id?'selected':''}" onclick="g9selFrag('${f.id}')" style="font-family:var(--m);font-size:10px;white-space:pre;line-height:1.6;text-align:left">${f.code}</div>`;
  }).join('');

  const allPlaced=Object.keys(g9placed).length===4;
  const correct=g9done?slotKeys.filter(k=>g9placed[k]&&g9frags.find(f=>f.id===g9placed[k])?.correct===k).length:0;

  return `
    <div class="ch-title">${CHAPTERS[9].name}</div>
    <div class="ch-heading">${CHAPTERS[9].sub}</div>
    <p class="game-intro">カードを選んでスロット [A]〜[D] に配置し、<code>withdraw()</code> メソッドを完成させてください。</p>
    <pre class="poly-dispatch" style="font-size:11px;line-height:2">void withdraw(double amount) {
  [A]
  try {
    [B]
  } catch (InsufficientFundsException e) {
    [C]
  } finally {
    [D]
  }
}</pre>
    <div class="cards-area" style="margin-bottom:.75rem">${cards}</div>
    ${slots}
    ${g9done
      ?`<div class="fb ok show" style="margin-top:.75rem">✓ ${correct}/4 正解！</div><div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:.5rem"><button class="btn btn-p" onclick="finishGame(${correct*6+1})">結果を見る →</button><button class="btn" onclick="retryG9()">もう一度 ↩</button></div>`
      :allPlaced?`<button class="btn btn-p" style="margin-top:.75rem" onclick="g9check()">確認する</button>`:''}`;
}
function g9selFrag(id){g9sel=g9sel===id?null:id;document.getElementById('screen').innerHTML=renderG9();}
function g9place(slot){if(!g9sel||g9done)return;g9placed[slot]=g9sel;g9sel=null;document.getElementById('screen').innerHTML=renderG9();}
function g9check(){g9done=true;document.getElementById('screen').innerHTML=renderG9();}

// ─── 実践編 ───────────────────────────────────
let gPst={p:0,sel:{},sub:false,hints:2,tries:0,hint:null};

function gPpick(id,v){
  gPst.sel[id]=v;
  gPst.sub=false;
  gPst.hint=null;
  document.getElementById('screen').innerHTML=renderGP();
}

function gPsubmit(){
  gPst.sub=true;
  gPst.tries++;
  gPst.hint=null;
  document.getElementById('screen').innerHTML=renderGP();
}

function gPshowHint(){
  if(gPst.hints<=0)return;
  const pz=gPpuzzles[gPst.p];
  const failing=pz.constraints.filter(c=>!c.check(gPst.sel));
  if(!failing.length)return;
  const c=failing[0];
  gPst.hints--;
  gPst.hint=`💡 「${c.label}」を満たすには、<strong>${c.hintQ}</strong> を見直してください。`;
  document.getElementById('screen').innerHTML=renderGP();
}

function gPnext(){
  gPst.p++;
  gPst.sel={};
  gPst.sub=false;
  gPst.hints=2;
  gPst.tries=0;
  gPst.hint=null;
  document.getElementById('screen').innerHTML=renderGP();
}

function retryGP(){
  gPst={p:0,sel:{},sub:false,hints:2,tries:0,hint:null};
  document.getElementById('screen').innerHTML=renderGP();
}

function renderGP(){
  const pz=gPpuzzles[gPst.p];
  const {sel,sub,hints,tries,hint}=gPst;
  const allSet=pz.decisions.every(d=>sel[d.id]);
  const cons=pz.constraints.map(c=>({...c,ok:c.check(sel)}));
  const allOk=allSet&&cons.every(c=>c.ok);
  const showRes=sub&&allSet;

  const conPanel=cons.map(c=>{
    const state=!showRes?'pending':c.ok?'ok':'ng';
    return `<div style="display:flex;align-items:center;gap:.5rem;padding:.3rem .6rem;border-radius:6px;background:${state==='pending'?'var(--s2)':state==='ok'?'rgba(70,170,70,.12)':'rgba(200,60,60,.12)'}">
      <span style="font-weight:700;color:${state==='pending'?'var(--tm)':state==='ok'?'var(--tok)':'var(--tng)'};min-width:16px;text-align:center">${state==='pending'?'◦':state==='ok'?'✓':'✗'}</span>
      <span style="font-size:12px;color:${state==='pending'?'var(--tm)':state==='ok'?'var(--tok)':'var(--tng)'}">${c.label}</span>
    </div>`;
  }).join('');

  const decPanel=pz.decisions.map(d=>`
    <div style="margin-bottom:.65rem">
      <div style="font-size:11px;color:var(--tm);margin-bottom:.3rem">${d.q}</div>
      <div style="display:flex;flex-wrap:wrap;gap:5px">
        ${d.opts.map(o=>`<button class="btn ${sel[d.id]===o.v?'btn-p':''}" onclick="gPpick('${d.id}','${o.v}')" style="font-size:11px">${o.l}</button>`).join('')}
      </div>
    </div>`).join('');

  let actions='';
  if(!sub&&allSet){
    actions=`<button class="btn btn-p" onclick="gPsubmit()">設計を確定する</button>`;
  } else if(showRes&&!allOk){
    const failN=cons.filter(c=>!c.ok).length;
    actions=`<div class="fb ng show">✗ ${failN}件の制約を満たせていません。</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:.5rem">
      <button class="btn btn-p" onclick="gPsubmit()">再確定する</button>
      ${hints>0?`<button class="btn" onclick="gPshowHint()">ヒント（残り${hints}）</button>`:`<span style="font-size:11px;color:var(--tm);align-self:center">ヒント使い切り</span>`}
    </div>`;
  } else if(showRes&&allOk&&gPst.p<gPpuzzles.length-1){
    actions=`<div class="fb ok show">✓ クリア！（${tries}回目で正解）</div>
    <button class="btn btn-p" style="margin-top:.5rem" onclick="gPnext()">次の問題へ →</button>`;
  } else if(showRes&&allOk&&gPst.p===gPpuzzles.length-1){
    actions=`<div class="fb ok show">✓ 全問クリア！（${tries}回目で正解）</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:.5rem">
      <button class="btn btn-p" onclick="finishGame(25)">結果を見る →</button>
      <button class="btn" onclick="retryGP()">最初から ↩</button>
    </div>`;
  }

  return `
    <div class="ch-title">${CHAPTERS[12].name} — 問題 ${gPst.p+1}/${gPpuzzles.length}</div>
    <div class="ch-heading">${pz.title}</div>
    <div class="info-box" style="margin-bottom:.75rem">${pz.context}</div>
    <div style="margin-bottom:.75rem">
      <div style="font-size:10px;color:var(--tm);margin-bottom:.4rem;letter-spacing:.05em">制約 — すべて満たす設計を選んでください</div>
      <div style="display:flex;flex-direction:column;gap:4px">${conPanel}</div>
    </div>
    <div style="background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:.75rem;margin-bottom:.75rem">
      <div style="font-size:10px;color:var(--tm);margin-bottom:.6rem;letter-spacing:.05em">設計の選択</div>
      ${decPanel}
    </div>
    ${hint?`<div class="info-box" style="margin-bottom:.75rem">${hint}</div>`:''}
    ${actions}`;
}

// ─── COMPLETE ─────────────────────────────────
function renderComplete(){
  updateNav();document.getElementById('prog').style.width='100%';
  const max=325,pct=Math.round(G.score/max*100);
  const msg=pct>=80?'銀行システムの設計を完璧に理解した！':pct>=50?'もう少し。もう一度挑戦してみよう。':'基礎を復習してからもう一度！';
  const sums=[
    {t:'クラスとオブジェクト',b:'クラスは設計図、オブジェクトはその実体。フィールドはデータ（残高・名義人）、メソッドは処理（入金・引き出し）。関連するデータと処理をひとまとめにするのが OOP の出発点。'},
    {t:'アクセス修飾子',b:'public/private/protected で情報を隠す。残高や暗証番号は private にして getBalance() などの窓口だけを公開する。'},
    {t:'継承',b:'is-a 関係でクラスを整理する。SavingsAccount は Account の一種だから、共通処理を親クラスに書いて再利用できる。'},
    {t:'合成 vs 集約',b:'合成は所有者が消えると子も消える（強い has-a）。集約は独立して存在できる（弱い has-a）。'},
    {t:'static',b:'static フィールドはクラス自体に属し全インスタンスで共有。金利はクラス全体で一つ、残高は口座ごとに別々。'},
    {t:'ポリモーフィズム',b:'同じ命令を送っても、実際のオブジェクト型に応じた実装が呼ばれる。Account[] に混在させて一括処理できる。'},
    {t:'抽象クラス',b:'インスタンス化できないクラス。abstract メソッドでサブクラスに実装を強制し、設計の契約書となる。'},
    {t:'コンストラクタ',b:'new でインスタンスを作るときに自動で呼ばれるメソッド。引数で受け取る値・デフォルト値・static の3種を正しく使い分けて初期化する。'},
    {t:'型キャスト',b:'親クラス型の変数を子クラス型に変換するダウンキャスト。instanceof で型を確認してからキャストすると ClassCastException を防げる。'},
    {t:'例外処理',b:'throw で例外を投げ、try で主処理を囲み、catch でエラーを受け取り、finally で後処理を確実に実行する。'},
    {t:'依存',b:'あるクラスが別のクラスをメソッド引数・ローカル変数として一時的に使う最も弱い関係。フィールドに持たないため疎結合を保てる。UML では点線矢印 →。'},
    {t:'実現',b:'クラスがインターフェースを implements すること。すべてのメソッドを正確なシグネチャで実装する必要がある。UML では点線＋白抜き三角 ▷。'},
    {t:'設計制約パズル',b:'継承・合成・アクセス修飾子の選択が複数の制約に同時に影響する。「全制約を満たす組み合わせ」を論理的に探す実践力が身につく。'},
  ];
  return `<div class="complete">
    <h2>🏦 銀行システム完成！</h2>
    <div class="big-score">${G.score}<span style="font-size:20px;color:var(--tm)"> / ${max}</span></div>
    <p style="color:var(--ts);margin-bottom:1.5rem">正解率 ${pct}% — ${msg}</p>
    <div class="summary-grid">${sums.map((s,i)=>`<div class="sum-card"><strong>${CHAPTERS[i].name}: ${s.t}</strong><p>${s.b}</p></div>`).join('')}</div>
    <button class="btn btn-p" onclick="restart()">最初からやり直す</button>
  </div>`;
}

function restart(){
  history.length=0;
  Object.assign(G,{chapter:0,phase:'story',line:0,score:0});
  g0st={phase:0,sounds:{},moveTried:false,movableOk:false};
  g1sel=g1m.map(()=>'pub');
  g2placed={};g2sel=null;g2done=false;
  g3bankDead=false;g3bankDead2=false;g3quiz=[null,null,null];
  g4rate=1.5;g4bal=[300000,150000,520000];g4quiz=[null,null];
  g5step=-1;g5quiz=[null,null,null];
  g6sel=g6members.map(()=>'concrete');g6done=false;
  g7sel=g7members.map(()=>'param');g7done=false;
  g8quiz=[null,null,null,null];
  g9placed={};g9sel=null;g9done=false;
  g10ans=[null,null,null,null,null];
  g11ans=[null,null,null,null,null];
  gPst={p:0,sel:{},sub:false,hints:2,tries:0,hint:null};
  closeGloss();
  render();
}
render();
